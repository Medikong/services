name: Image Publish

# 이 workflow는 배포용 Git tag push 때만 서비스 이미지를 build/push하고 GitOps values를 업데이트한다.
# 처리 흐름: deploy tag 해석 -> 이미지 matrix 생성 -> ECR 로그인 -> 이미지 build/push -> digest 수집 -> deploy-plan artifact 생성 -> gitops values 업데이트.

on:
  push:
    tags:
      - 'deploy/dev/*/v*.*.*'
      - 'deploy/dev/changed/*.*.*-*'
      - 'deploy/dev/all/*.*.*-*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: 205623789422.dkr.ecr.ap-northeast-2.amazonaws.com
  AWS_REGION: ap-northeast-2
  DOCKER_BUILD_PLATFORMS: linux/amd64,linux/arm64

jobs:
  select-images:
    name: deploy tag 이미지 선택
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.matrix.outputs.images }}
      image_count: ${{ steps.matrix.outputs.image_count }}
      deploy_environment: ${{ steps.matrix.outputs.deploy_environment }}
      deploy_target: ${{ steps.matrix.outputs.deploy_target }}
      deploy_tag: ${{ steps.matrix.outputs.deploy_tag }}

    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: deploy tag matrix 생성
        id: matrix
        shell: bash
        env:
          DEPLOY_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          all_images="$(sh scripts/list_services.sh list --mode images --format json)"

          IFS=/ read -r deploy_prefix deploy_environment deploy_target deploy_value deploy_extra <<EOF
          ${DEPLOY_TAG}
          EOF

          if [ "${deploy_prefix}" != "deploy" ] || [ "${deploy_environment}" != "dev" ] || [ -n "${deploy_extra:-}" ]; then
            printf '지원하지 않는 deploy tag입니다: %s\n' "${DEPLOY_TAG}" >&2
            exit 2
          fi

          if jq -e --arg target "${deploy_target}" 'index($target)' <<<"${all_images}" >/dev/null; then
              if ! [[ "${deploy_value}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                printf '서비스 deploy tag의 버전이 SemVer가 아닙니다: %s\n' "${DEPLOY_TAG}" >&2
                exit 2
              fi
              images="$(jq -nc --arg image "${deploy_target}" --arg tag "${deploy_value}" '[{image: $image, tag: $tag}]')"
          else
            case "${deploy_target}" in
              changed|all)
              git fetch --tags --force
              tag_contents="$(git for-each-ref "refs/tags/${DEPLOY_TAG}" --format='%(contents)')"
              if ! jq -e . >/dev/null <<<"${tag_contents}"; then
                printf 'deploy plan annotation이 JSON이 아닙니다: %s\n' "${DEPLOY_TAG}" >&2
                exit 2
              fi

              jq -e \
                --arg environment "${deploy_environment}" \
                --arg target "${deploy_target}" \
                --arg deploy_tag "${DEPLOY_TAG}" \
                --argjson allowed "${all_images}" \
                '
                  .schema_version == 1
                  and .environment == $environment
                  and .target == $target
                  and .deploy_tag == $deploy_tag
                  and (.services | type == "array")
                  and (.services | length > 0)
                  and all(.services[]; . as $service |
                    ($service.image | type == "string")
                    and ($service.tag | type == "string")
                    and ($service.tag | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))
                    and ($allowed | index($service.image))
                  )
                  and (
                    if $target == "all" then
                      ((.services | map(.image) | sort) == ($allowed | sort))
                    else
                      true
                    end
                  )
                ' <<<"${tag_contents}" >/dev/null

              images="$(jq -c '.services | map({image, tag})' <<<"${tag_contents}")"
                ;;
              *)
                printf '지원하지 않는 deploy target입니다: %s\n' "${deploy_target}" >&2
                printf '현재 서비스 이미지 후보: %s\n' "${all_images}" >&2
                exit 2
                ;;
            esac
          fi

          image_count="$(jq 'length' <<<"${images}")"
          printf 'images=%s\n' "${images}" >> "${GITHUB_OUTPUT}"
          printf 'image_count=%s\n' "${image_count}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_environment=%s\n' "${deploy_environment}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_target=%s\n' "${deploy_target}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_tag=%s\n' "${DEPLOY_TAG}" >> "${GITHUB_OUTPUT}"
          printf '선택된 이미지: %s\n' "${images}"

  publish:
    name: 이미지 publish (${{ matrix.image }}:${{ matrix.tag }})
    needs: select-images
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.select-images.outputs.images) }}

    steps:
      - name: 소스 내려받기
        id: source-checkout
        uses: actions/checkout@v4

      - name: Task 설치
        id: task-setup
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: AWS 인증 (OIDC)
        id: aws-auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::205623789422:role/github-actions-ecr-role
          aws-region: ap-northeast-2

      - name: Docker Buildx 설정
        id: buildx-setup
        uses: docker/setup-buildx-action@v3

      - name: ECR 로그인
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy 스캔용 이미지 빌드
        id: trivy-image-build
        run: |
          docker build \
            --platform linux/amd64 \
            -f services/${{ matrix.image }}/Dockerfile \
            -t ${{ matrix.image }}:scan \
            .
      - name: Trivy CRITICAL 스캔 (ECR push 차단)
        id: trivy-scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
      - name: Docker 이미지 빌드
        id: image-build
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          DOCKER_BUILD_CACHE_FROM: |
            type=gha,scope=${{ matrix.image }}-linux-amd64
            type=gha,scope=${{ matrix.image }}-linux-arm64
          DOCKER_BUILD_CACHE_TO: |
            type=gha,scope=${{ matrix.image }}-linux-amd64,mode=max
            type=gha,scope=${{ matrix.image }}-linux-arm64,mode=max
        run: |
          set -euo pipefail
          task app-image-build \
            SERVICE="${{ matrix.image }}" \
            IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
            IMAGE_TAG="${{ matrix.tag }}" \
            DOCKER_BUILD_PLATFORMS="${DOCKER_BUILD_PLATFORMS}" \
            DOCKER_BUILD_CACHE_FROM="${DOCKER_BUILD_CACHE_FROM}" \
            DOCKER_BUILD_CACHE_TO="${DOCKER_BUILD_CACHE_TO}"

      - name: digest 수집 및 deploy plan 작성
        id: deploy-plan
        shell: bash
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          tag="${{ matrix.tag }}"
          image_ref="${IMAGE_REGISTRY}/${image}:${tag}"

          digest="$(aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${image}" \
            --image-ids imageTag="${tag}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"

          if [ -z "${digest}" ] || [ "${digest}" = "None" ]; then
            printf 'push된 이미지 digest를 확인할 수 없습니다: %s\n' "${image_ref}" >&2
            exit 1
          fi

          mkdir -p deploy-plan
          jq -n \
            --arg image "${image}" \
            --arg tag "${tag}" \
            --arg image_ref "${image_ref}" \
            --arg digest "${digest}" \
            --arg digest_ref "${IMAGE_REGISTRY}/${image}@${digest}" \
            --arg deploy_tag "${{ needs.select-images.outputs.deploy_tag }}" \
            --arg deploy_target "${{ needs.select-images.outputs.deploy_target }}" \
            --arg deploy_environment "${{ needs.select-images.outputs.deploy_environment }}" \
            --arg source_sha "${GITHUB_SHA}" \
            '{
              image: $image,
              tag: $tag,
              image_ref: $image_ref,
              digest: $digest,
              digest_ref: $digest_ref,
              digest_source: "ecr-api",
              deploy_tag: $deploy_tag,
              deploy_target: $deploy_target,
              deploy_environment: $deploy_environment,
              source_sha: $source_sha,
              gitops_action: "updated"
            }' > "deploy-plan/${image}.json"

          {
            printf '### 이미지 publish\n\n'
            printf -- '- 이미지: `%s`\n' "${image}"
            printf -- '- 태그 참조: `%s`\n' "${image_ref}"
            printf -- '- digest 참조: `%s`\n' "${IMAGE_REGISTRY}/${image}@${digest}"
            printf -- '- deploy tag: `%s`\n' "${{ needs.select-images.outputs.deploy_tag }}"
            printf -- '- GitOps 작업: `updated`\n'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: 이미지별 deploy plan 업로드
        id: deploy-plan-upload
        uses: actions/upload-artifact@v4
        with:
          name: deploy-plan-${{ matrix.image }}
          path: deploy-plan/${{ matrix.image }}.json
          if-no-files-found: error

      - name: 이미지 publish 결과 작성
        id: publish-result
        if: always()
        shell: bash
        env:
          SOURCE_CHECKOUT_OUTCOME: ${{ steps.source-checkout.outcome }}
          TASK_SETUP_OUTCOME: ${{ steps.task-setup.outcome }}
          AWS_AUTH_OUTCOME: ${{ steps.aws-auth.outcome }}
          BUILDX_SETUP_OUTCOME: ${{ steps.buildx-setup.outcome }}
          ECR_LOGIN_OUTCOME: ${{ steps.ecr-login.outcome }}
          TRIVY_IMAGE_BUILD_OUTCOME: ${{ steps.trivy-image-build.outcome }}
          TRIVY_SCAN_OUTCOME: ${{ steps.trivy-scan.outcome }}
          IMAGE_BUILD_OUTCOME: ${{ steps.image-build.outcome }}
          DEPLOY_PLAN_OUTCOME: ${{ steps.deploy-plan.outcome }}
          DEPLOY_PLAN_UPLOAD_OUTCOME: ${{ steps.deploy-plan-upload.outcome }}
        run: |
          set -euo pipefail
          status="success"
          stage="complete"
          reason="이미지 publish와 deploy plan 작성 완료"

          check_outcome() {
            local candidate_stage="$1"
            local candidate_reason="$2"
            local outcome="$3"
            if [ "${status}" = "success" ] && [ "${outcome}" != "success" ]; then
              status="failure"
              stage="${candidate_stage}"
              reason="${candidate_reason} (step outcome: ${outcome})"
            fi
          }

          check_outcome "source-checkout" "서비스 저장소 checkout 실패" "${SOURCE_CHECKOUT_OUTCOME}"
          check_outcome "task-setup" "Task 설치 실패" "${TASK_SETUP_OUTCOME}"
          check_outcome "aws-auth" "AWS OIDC 인증 실패" "${AWS_AUTH_OUTCOME}"
          check_outcome "buildx-setup" "Docker Buildx 설정 실패" "${BUILDX_SETUP_OUTCOME}"
          check_outcome "ecr-login" "Amazon ECR 로그인 실패" "${ECR_LOGIN_OUTCOME}"
          check_outcome "trivy-image-build" "Trivy 검사 대상 이미지 빌드 실패" "${TRIVY_IMAGE_BUILD_OUTCOME}"
          check_outcome "trivy-scan" "Trivy CRITICAL 취약점 검사 실패" "${TRIVY_SCAN_OUTCOME}"
          check_outcome "image-build" "다중 아키텍처 이미지 build 또는 ECR push 실패" "${IMAGE_BUILD_OUTCOME}"
          check_outcome "deploy-plan" "ECR digest 조회 또는 deploy plan 작성 실패" "${DEPLOY_PLAN_OUTCOME}"
          check_outcome "deploy-plan-upload" "서비스 deploy plan artifact 업로드 실패" "${DEPLOY_PLAN_UPLOAD_OUTCOME}"

          digest=""
          if [ -f "deploy-plan/${{ matrix.image }}.json" ]; then
            digest="$(jq -r '.digest // ""' "deploy-plan/${{ matrix.image }}.json")"
          fi

          mkdir -p publish-results
          jq -n \
            --arg image "${{ matrix.image }}" \
            --arg tag "${{ matrix.tag }}" \
            --arg status "${status}" \
            --arg stage "${stage}" \
            --arg reason "${reason}" \
            --arg digest "${digest}" \
            '{
              image: $image,
              tag: $tag,
              status: $status,
              stage: $stage,
              reason: $reason,
              digest: $digest
            }' > "publish-results/${{ matrix.image }}.json"
          printf 'status=%s\n' "${status}" >> "${GITHUB_OUTPUT}"

      - name: 이미지 publish 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-result-${{ matrix.image }}
          path: publish-results/${{ matrix.image }}.json
          if-no-files-found: error

      - name: 이미지 publish 실패 반영
        if: always() && steps.publish-result.outputs.status != 'success'
        shell: bash
        run: exit 1

  deploy-plan:
    name: deploy plan 조립 및 gitops 업데이트
    needs:
      - select-images
      - publish
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: 이미지별 deploy plan 다운로드
        id: deploy-plan-download
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-plan-*
          path: deploy-plan
          merge-multiple: true

      - name: 통합 deploy plan 작성
        id: deploy-plan-assemble
        shell: bash
        run: |
          set -euo pipefail
          jq -s 'sort_by(.image)' deploy-plan/*.json > deploy-plan.json

          {
            printf '# 이미지 publish deploy plan\n\n'
            printf -- '- deploy tag: `%s`\n' "${{ needs.select-images.outputs.deploy_tag }}"
            printf -- '- deploy target: `%s`\n' "${{ needs.select-images.outputs.deploy_target }}"
            printf -- '- 소스 commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- registry: `%s`\n' "${IMAGE_REGISTRY}"
            printf -- '- GitOps 작업: `updated`\n\n'
            printf '| 이미지 | 태그 참조 | digest 참조 |\n'
            printf '| --- | --- | --- |\n'
            jq -r '.[] | "| `\(.image)` | `\(.image_ref)` | `\(.digest_ref)` |"' deploy-plan.json
          } > deploy-plan.md

          cat deploy-plan.md >> "${GITHUB_STEP_SUMMARY}"

      - name: 통합 deploy plan 업로드
        id: deploy-plan-upload
        uses: actions/upload-artifact@v4
        with:
          name: image-publish-deploy-plan
          path: |
            deploy-plan.json
            deploy-plan.md
          if-no-files-found: error

      - name: gitops repo 체크아웃
        id: gitops-checkout
        uses: actions/checkout@v4
        with:
          repository: Medikong/e-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: gitops values 이미지 digest 업데이트
        id: gitops-update
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          while IFS= read -r item; do
            image="$(jq -r '.image' <<<"${item}")"
            tag="$(jq -r '.tag' <<<"${item}")"
            digest="$(jq -r '.digest' <<<"${item}")"
            service_file="values/services/${image}.yaml"
            if [ ! -f "${service_file}" ] && [[ "${image}" == *-service ]]; then
              service_file="values/services/${image%-service}.yaml"
            fi

            if [ ! -f "${service_file}" ]; then
              printf 'GitOps values 파일을 찾을 수 없습니다: %s\n' "${service_file}" >&2
              exit 1
            fi

            python3 - "${service_file}" "${tag}" "${digest}" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          tag = sys.argv[2]
          digest = sys.argv[3]
          if not re.fullmatch(r"sha256:[0-9a-f]{64}", digest):
              raise SystemExit(f"invalid image digest: {digest}")

          lines = path.read_text().splitlines(keepends=True)
          image_headers = [
              index for index, line in enumerate(lines)
              if re.fullmatch(r"image:\s*(?:#.*)?(?:\r?\n)?", line)
          ]
          if len(image_headers) != 1:
              raise SystemExit(f"expected exactly one top-level image mapping: {path}")

          start = image_headers[0] + 1
          end = len(lines)
          for index in range(start, len(lines)):
              stripped = lines[index].strip()
              if stripped and not stripped.startswith("#") and not lines[index].startswith((" ", "\t")):
                  end = index
                  break

          fields = {}
          for index in range(start, end):
              match = re.match(r"^  ([A-Za-z0-9_-]+):", lines[index])
              if match:
                  key = match.group(1)
                  if key in fields:
                      raise SystemExit(f"duplicate image.{key} field: {path}")
                  fields[key] = index

          updates = {"tag": "", "digest": digest, "version": tag}
          for key, value in updates.items():
              rendered = f"  {key}: {json.dumps(value)}\n"
              if key in fields:
                  lines[fields[key]] = rendered
              else:
                  lines.insert(end, rendered)
                  end += 1

          path.write_text("".join(lines))
          PY
            printf 'updated: %s -> %s@%s (version %s)\n' "${service_file}" "${image}" "${digest}" "${tag}"
          done < <(jq -c '.[]' ../deploy-plan.json)

      - name: gitops repo push
        id: gitops-push
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          if git diff --quiet; then
            printf 'no changes to commit\n'
            exit 0
          fi

          git add values/services/
          git commit -m "chore: deploy images for ${{ needs.select-images.outputs.deploy_tag }}"
          git push

      - name: GitOps 반영 결과 작성
        id: gitops-result
        if: always()
        shell: bash
        env:
          DEPLOY_PLAN_DOWNLOAD_OUTCOME: ${{ steps.deploy-plan-download.outcome }}
          DEPLOY_PLAN_ASSEMBLE_OUTCOME: ${{ steps.deploy-plan-assemble.outcome }}
          DEPLOY_PLAN_UPLOAD_OUTCOME: ${{ steps.deploy-plan-upload.outcome }}
          GITOPS_CHECKOUT_OUTCOME: ${{ steps.gitops-checkout.outcome }}
          GITOPS_UPDATE_OUTCOME: ${{ steps.gitops-update.outcome }}
          GITOPS_PUSH_OUTCOME: ${{ steps.gitops-push.outcome }}
        run: |
          set -euo pipefail
          status="success"
          stage="complete"
          reason="GitOps 배포 값 반영 완료"

          check_outcome() {
            local candidate_stage="$1"
            local candidate_reason="$2"
            local outcome="$3"
            if [ "${status}" = "success" ] && [ "${outcome}" != "success" ]; then
              status="failure"
              stage="${candidate_stage}"
              reason="${candidate_reason} (step outcome: ${outcome})"
            fi
          }

          check_outcome "deploy-plan-download" "서비스 deploy plan artifact 다운로드 실패" "${DEPLOY_PLAN_DOWNLOAD_OUTCOME}"
          check_outcome "deploy-plan-assemble" "통합 deploy plan 작성 실패" "${DEPLOY_PLAN_ASSEMBLE_OUTCOME}"
          check_outcome "deploy-plan-upload" "통합 deploy plan artifact 업로드 실패" "${DEPLOY_PLAN_UPLOAD_OUTCOME}"
          check_outcome "gitops-checkout" "GitOps 저장소 checkout 실패" "${GITOPS_CHECKOUT_OUTCOME}"
          check_outcome "gitops-update" "GitOps 서비스 values 업데이트 실패" "${GITOPS_UPDATE_OUTCOME}"
          check_outcome "gitops-push" "GitOps 저장소 commit 또는 push 실패" "${GITOPS_PUSH_OUTCOME}"

          mkdir -p deploy-result
          jq -n \
            --arg status "${status}" \
            --arg stage "${stage}" \
            --arg reason "${reason}" \
            '{status: $status, stage: $stage, reason: $reason}' \
            > deploy-result/deploy-result.json
          printf 'status=%s\n' "${status}" >> "${GITHUB_OUTPUT}"

      - name: GitOps 반영 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitops-deploy-result
          path: deploy-result/deploy-result.json
          if-no-files-found: error

  notify:
    name: Discord deploy 결과 알림
    needs:
      - select-images
      - publish
      - deploy-plan
    # 이미지가 선택되지 않은 정상 no-op은 알리지 않고, 선택 단계 자체의 실패는 알린다.
    if: >-
      ${{
        always() &&
        (
          needs.select-images.result != 'success' ||
          needs.select-images.outputs.image_count != '0'
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: 서비스 저장소 checkout
        uses: actions/checkout@v4

      - name: 이미지 publish 결과 다운로드
        if: needs.publish.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: publish-result-*
          path: notification/publish-results
          merge-multiple: true

      - name: GitOps 반영 결과 다운로드
        if: needs.deploy-plan.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: gitops-deploy-result
          path: notification/deploy-result

      - name: Discord deploy 결과 전송
        env:
          DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          SELECT_RESULT: ${{ needs.select-images.result }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          DEPLOY_RESULT: ${{ needs.deploy-plan.result }}
          SELECTED_IMAGES_JSON: ${{ needs.select-images.outputs.images }}
          DEPLOY_ENVIRONMENT: ${{ needs.select-images.outputs.deploy_environment }}
          DEPLOY_TARGET: ${{ needs.select-images.outputs.deploy_target }}
          DEPLOY_TAG: ${{ needs.select-images.outputs.deploy_tag || github.ref_name }}
        run: |
          bash .github/scripts/send-discord-deploy.sh \
            --template .github/notifications/discord/deploy-result.json \
            --publish-results-dir notification/publish-results \
            --deploy-result-file notification/deploy-result/deploy-result.json \
            --output "${RUNNER_TEMP}/discord-deploy-payload.json"

  no-image-publish:
    name: 이미지 publish 없음
    needs: select-images
    if: needs.select-images.outputs.image_count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: no-op 보고
        run: echo "이번 deploy tag에서 publish할 Docker 이미지가 없습니다."
