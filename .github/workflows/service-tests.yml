name: Service Tests

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'services/**'
      - 'tests/**'
      - 'packages/**'
      - 'config/services.yml'
      - 'scripts/list_services.sh'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Taskfile.yml'
      - '.github/workflows/service-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'services/**'
      - 'tests/**'
      - 'packages/**'
      - 'config/services.yml'
      - 'scripts/list_services.sh'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Taskfile.yml'
      - '.github/workflows/service-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: service-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    name: Detect service test scope
    runs-on: ubuntu-latest
    outputs:
      test_services: ${{ steps.matrix.outputs.test_services }}
      test_count: ${{ steps.matrix.outputs.test_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build test matrix
        id: matrix
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base="${BASE_SHA:-${BEFORE_SHA:-}}"
          if [ -z "${base}" ] || [[ "${base}" =~ ^0+$ ]]; then
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -n "${base}" ]; then
            git diff --name-only "${base}" HEAD > changed-files.txt
          else
            git ls-files > changed-files.txt
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            test_services="$(sh scripts/list_services.sh select --mode tests --all --format json)"
          else
            test_services="$(sh scripts/list_services.sh select \
              --mode tests \
              --changed-files changed-files.txt \
              --common tests \
              --common packages \
              --common pyproject.toml \
              --common uv.lock \
              --common Taskfile.yml \
              --common config/services.yml \
              --common scripts/list_services.sh \
              --common .github/workflows/service-tests.yml \
              --format json)"
          fi

          test_count="$(jq 'length' <<<"${test_services}")"
          printf 'test_services=%s\n' "${test_services}" >> "${GITHUB_OUTPUT}"
          printf 'test_count=%s\n' "${test_count}" >> "${GITHUB_OUTPUT}"
          printf 'Selected test services: %s\n' "${test_services}"

  service-unit:
    name: Service unit tests
    needs: detect-services
    if: needs.detect-services.outputs.test_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: Run service unit tests in Docker
        shell: bash
        run: |
          set -euo pipefail
          services="$(jq -r 'join(" ")' <<'JSON'
          ${{ needs.detect-services.outputs.test_services }}
          JSON
          )"
          task test-services SERVICES="${services}"

      - name: Append unit test summary
        if: always()
        shell: bash
        run: |
          if [ -f tests/tmp/reports/unit/summary.md ]; then
            cat tests/tmp/reports/unit/summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: tests/tmp/reports/unit/
          if-no-files-found: ignore

  no-service-unit:
    name: No service unit tests
    needs: detect-services
    if: needs.detect-services.outputs.test_count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: Report no-op
        run: echo "No managed service unit tests selected for this change."
