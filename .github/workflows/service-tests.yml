name: Service Tests

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'services/**'
      - 'tests/**'
      - 'packages/**'
      - 'config/services.yml'
      - 'scripts/list_services.sh'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Taskfile.yml'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/service-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'services/**'
      - 'tests/**'
      - 'packages/**'
      - 'config/services.yml'
      - 'scripts/list_services.sh'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Taskfile.yml'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/service-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: service-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    name: Detect service test scope
    runs-on: ubuntu-latest
    outputs:
      test_services: ${{ steps.matrix.outputs.test_services }}
      test_count: ${{ steps.matrix.outputs.test_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build test matrix
        id: matrix
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base="${BASE_SHA:-${BEFORE_SHA:-}}"
          if [ -z "${base}" ] || [[ "${base}" =~ ^0+$ ]]; then
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -n "${base}" ]; then
            git diff --name-only "${base}" HEAD > changed-files.txt
          else
            git ls-files > changed-files.txt
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            test_services="$(sh scripts/list_services.sh select --mode tests --all --format json)"
          else
            test_services="$(sh scripts/list_services.sh select \
              --mode tests \
              --changed-files changed-files.txt \
              --common tests \
              --common packages \
              --common pyproject.toml \
              --common uv.lock \
              --common Taskfile.yml \
              --common go.work \
              --common go.work.sum \
              --common config/services.yml \
              --common scripts/list_services.sh \
              --common .github/workflows/service-tests.yml \
              --format json)"
          fi

          test_count="$(jq 'length' <<<"${test_services}")"
          printf 'test_services=%s\n' "${test_services}" >> "${GITHUB_OUTPUT}"
          printf 'test_count=%s\n' "${test_count}" >> "${GITHUB_OUTPUT}"
          printf 'Selected test services: %s\n' "${test_services}"

  service-unit:
    name: Service unit tests
    needs: detect-services
    if: needs.detect-services.outputs.test_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: Run service unit tests in Docker
        shell: bash
        run: |
          set -euo pipefail
          services="$(jq -r 'join(" ")' <<'JSON'
          ${{ needs.detect-services.outputs.test_services }}
          JSON
          )"
          task test-services SERVICES="${services}"

      - name: Append unit test summary
        if: always()
        shell: bash
        run: |
          if [ -f tests/tmp/reports/unit/summary.md ]; then
            cat tests/tmp/reports/unit/summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: tests/tmp/reports/unit/
          if-no-files-found: ignore

  no-service-unit:
    name: No service unit tests
    needs: detect-services
    if: needs.detect-services.outputs.test_count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: Report no-op
        run: echo "No managed service unit tests selected for this change."

  go-services:
    name: Go services and foundation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            packages/go-audit/go.sum
            packages/go-authz/go.sum
            packages/go-contracts/go.sum
            packages/go-platform/go.sum
            services/auth-service/go.sum
            services/coupon-service/go.sum
            services/go-reference-service/go.sum

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint Go service OpenAPI documents
        run: |
          npx --yes @redocly/cli@2.38.0 lint \
            --config services/go-reference-service/redocly.yaml \
            services/go-reference-service/api/openapi.yaml \
            services/go-reference-service/api/operational.openapi.yaml
          npx --yes @redocly/cli@2.38.0 lint \
            --config services/auth-service/api/openapi/redocly.yaml \
            services/auth-service/api/openapi/openapi.bundle.yaml \
            services/auth-service/api/openapi/dev.openapi.bundle.yaml
          npx --yes @redocly/cli@2.38.0 lint \
            --config services/coupon-service/api/openapi/redocly.yaml \
            services/coupon-service/api/openapi/openapi.bundle.yaml

      - name: Check auth OpenAPI bundle snapshot
        run: ./services/auth-service/scripts/check-openapi.sh --snapshot-only

      - name: Check coupon OpenAPI bundle snapshot
        run: ./services/coupon-service/scripts/check-openapi.sh --snapshot-only

      - name: Test and vet Go foundation
        run: |
          go test -race ./packages/go-audit/... ./packages/go-authz/... ./packages/go-contracts/... ./packages/go-platform/... ./services/auth-service/... ./services/coupon-service/... ./services/go-reference-service/...
          go vet ./packages/go-audit/... ./packages/go-authz/... ./packages/go-contracts/... ./packages/go-platform/... ./services/auth-service/... ./services/coupon-service/... ./services/go-reference-service/...
          go test -tags=integration -count=1 ./services/go-reference-service/tests/integration ./services/auth-service/tests/integration ./services/coupon-service/...

      - name: Build Go service images
        run: |
          docker build -f services/go-reference-service/Dockerfile -t go-reference-service:ci .
          docker build -f services/auth-service/Dockerfile -t auth-service:ci .
          docker build -f services/coupon-service/Dockerfile -t coupon-service:ci .
