name: CI

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    name: Detect service test scope
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.matrix.outputs.services }}
      count: ${{ steps.matrix.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            concert-service:
              - 'services/concert-service/**'
            notification-service:
              - 'services/notification-service/**'
            payment-service:
              - 'services/payment-service/**'
            reservation-service:
              - 'services/reservation-service/**'
            ticket-service:
              - 'services/ticket-service/**'
            common:
              - 'tests/**'
              - 'packages/**'
              - 'Taskfile.yml'
              - '.github/workflows/ci.yml'

      - name: Build test matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          all_services='["auth-service","concert-service","notification-service","payment-service","reservation-service","ticket-service"]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.changes.outputs.common }}" = "true" ]; then
            services="${all_services}"
          else
            services="$(jq -c '[.[] | select(. != "common")]' <<<'${{ steps.changes.outputs.changes }}')"
          fi
          count="$(jq 'length' <<<"${services}")"
          printf 'services=%s\n' "${services}" >> "${GITHUB_OUTPUT}"
          printf 'count=%s\n' "${count}" >> "${GITHUB_OUTPUT}"
          printf 'Selected services: %s\n' "${services}"

  service-unit:
    name: Unit ${{ matrix.service }}
    needs: detect-services
    if: needs.detect-services.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Run service unit tests in Docker
        run: task test-service SERVICE=${{ matrix.service }}

  no-service-unit:
    name: No service unit tests
    needs: detect-services
    if: needs.detect-services.outputs.count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: Report no-op
        run: echo "No managed service unit tests selected for this change."
