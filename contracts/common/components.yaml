openapi: 3.1.0
info:
  title: Medikong Common OpenAPI Components
  version: 0.1.0

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    X-Request-Id:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: Request correlation id. If absent, the server may generate one.
    traceparent:
      name: traceparent
      in: header
      required: false
      schema:
        type: string
      description: W3C trace context header.
    X-User-Id:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Authenticated user id created by the trusted gateway after JWT and Session validation.
    X-Session-Id:
      name: X-Session-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Authenticated Session id created by the trusted gateway after JWT and Session validation.
    X-Token-Id:
      name: X-Token-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Access JWT id created by the trusted gateway after JWT and Session validation.
    X-User-Email:
      name: X-User-Email
      in: header
      required: false
      deprecated: true
      schema:
        type: string
        format: email
      description: Legacy compatibility parameter. The identity-only gateway does not create or trust this header.
    X-User-Role:
      name: X-User-Role
      in: header
      required: false
      deprecated: true
      schema:
        $ref: "#/components/schemas/UserRole"
      description: Legacy compatibility parameter. The identity-only gateway does not create or trust this header.
    Idempotency-Key:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Idempotency key for create or command requests.
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum number of items to return.
    cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Cursor from the previous page response.
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource id.
    dropId:
      name: dropId
      in: path
      required: true
      schema:
        type: string
      description: Drop id.
    productId:
      name: productId
      in: path
      required: true
      schema:
        type: string
      description: Product id.
    requestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
      description: Review request id.
    logId:
      name: logId
      in: path
      required: true
      schema:
        type: string
      description: Operation log id.
    paymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
      description: Payment id.
    orderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
      description: Order id.
    notificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
      description: Notification id.

  schemas:
    UserRole:
      type: string
      enum:
        - CUSTOMER
        - OPERATOR
        - ADMIN
      description: Legacy business role enum. It is not an Auth JWT claim or trusted gateway header.
    JwtAccessTokenClaims:
      type: object
      additionalProperties: false
      required:
        - iss
        - sub
        - sid
        - aud
        - iat
        - exp
        - jti
      properties:
        iss:
          type: string
          minLength: 1
          description: Environment-specific Auth issuer. The current runtime falls back to ServiceName when unset; the target production policy requires an explicit value and rejects that fallback.
          examples:
            - https://auth.example.internal
        sub:
          type: string
          format: uuid
          description: Canonical user id.
          examples:
            - 018fdc02-f2d2-7b3a-9d11-2e9f22fef001
        sid:
          type: string
          format: uuid
          description: Auth Session id.
        aud:
          description: Protected API audience. The initial audience is dropmong-api.
          oneOf:
            - type: string
              const: dropmong-api
            - type: array
              minItems: 1
              uniqueItems: true
              contains:
                const: dropmong-api
              items:
                type: string
        iat:
          type: integer
          description: Issued-at time as Unix epoch seconds.
          examples:
            - 1779945000
        exp:
          type: integer
          description: Expiration time as Unix epoch seconds.
          examples:
            - 1779945900
        jti:
          type: string
          format: uuid
          description: Access JWT id used for request correlation and audit.
    ErrorResponse:
      type: object
      required:
        - error
        - requestId
        - occurredAt
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              examples:
                - order.sold_out
            message:
              type: string
              examples:
                - Drop inventory is sold out.
            details:
              type: object
              additionalProperties: true
        requestId:
          type: string
          examples:
            - req-01HV6W8ZK2J2J9N9S4V7T3F0CA
        occurredAt:
          type: string
          format: date-time
          examples:
            - "2026-05-28T10:15:30Z"
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
          examples:
            - ok
        service:
          type: string
          examples:
            - auth-service
        timestamp:
          type: string
          format: date-time
          description: Response generation time in UTC.
          examples:
            - "2026-05-28T10:15:30Z"
    ReadinessResponse:
      type: object
      required:
        - status
        - service
        - checks
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
          examples:
            - ready
        service:
          type: string
          examples:
            - auth-service
        checks:
          type: object
          additionalProperties:
            type: string
          examples:
            - database: ok
        timestamp:
          type: string
          format: date-time
          description: Response generation time in UTC.
          examples:
            - "2026-05-28T10:15:30Z"
    PageInfo:
      type: object
      required:
        - hasNext
      properties:
        nextCursor:
          type:
            - string
            - "null"
        hasNext:
          type: boolean

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user is not allowed to access the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with the current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Request is syntactically valid but violates domain rules.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service is not ready to receive traffic.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
