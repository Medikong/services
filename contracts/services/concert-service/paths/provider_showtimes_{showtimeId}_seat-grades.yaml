post:
  tags:
    - Provider API
  summary: Provider create showtime seat grades
  operationId: providerCreateShowtimeSeatGrades
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/X-Request-Id
    - $ref: ../../../common/components.yaml#/components/parameters/X-Trace-Id
    - $ref: ../../../common/components.yaml#/components/parameters/Idempotency-Key
    - $ref: ../../../common/components.yaml#/components/parameters/showtimeId
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../openapi.yaml#/components/schemas/SeatGradeCreateRequest
  responses:
    "201":
      description: Seat grades created.
      content:
        application/json:
          schema:
            type: object
            required:
              - items
            properties:
              items:
                type: array
                items:
                  $ref: ../openapi.yaml#/components/schemas/SeatGrade
    "400":
      $ref: ../../../common/components.yaml#/components/responses/BadRequest
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "403":
      $ref: ../../../common/components.yaml#/components/responses/Forbidden
    "404":
      $ref: ../../../common/components.yaml#/components/responses/NotFound
    "409":
      $ref: ../../../common/components.yaml#/components/responses/Conflict
    "422":
      $ref: ../../../common/components.yaml#/components/responses/UnprocessableEntity
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
