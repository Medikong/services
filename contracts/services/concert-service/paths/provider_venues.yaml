post:
  tags:
    - Provider API
  summary: Provider create venue
  operationId: providerCreateVenue
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/X-Request-Id
    - $ref: ../../../common/components.yaml#/components/parameters/X-Trace-Id
    - $ref: ../../../common/components.yaml#/components/parameters/Idempotency-Key
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../openapi.yaml#/components/schemas/VenueCreateRequest
  responses:
    "201":
      description: Venue created.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/Venue
    "400":
      $ref: ../../../common/components.yaml#/components/responses/BadRequest
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "403":
      $ref: ../../../common/components.yaml#/components/responses/Forbidden
    "422":
      $ref: ../../../common/components.yaml#/components/responses/UnprocessableEntity
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
get:
  tags:
    - Provider API
  summary: Provider list venues
  operationId: providerListVenues
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/X-Request-Id
    - $ref: ../../../common/components.yaml#/components/parameters/X-Trace-Id
    - $ref: ../../../common/components.yaml#/components/parameters/limit
    - $ref: ../../../common/components.yaml#/components/parameters/cursor
  responses:
    "200":
      description: Venue list.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/VenueListResponse
    "400":
      $ref: ../../../common/components.yaml#/components/responses/BadRequest
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "403":
      $ref: ../../../common/components.yaml#/components/responses/Forbidden
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
