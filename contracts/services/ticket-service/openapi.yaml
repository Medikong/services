openapi: 3.1.0
info:
  title: ticket-service API
  version: 0.1.0
  description: Medikong ticket-service contract draft.

servers:
  - url: http://localhost:8085
    description: local

security:
  - BearerAuth: []

paths:
  /tickets/issue:
    $ref: ./paths/tickets_issue.yaml
  /tickets/{ticketId}:
    $ref: ./paths/tickets_{ticketId}.yaml
  /tickets/me:
    $ref: ./paths/tickets_me.yaml

components:
  securitySchemes:
    BearerAuth:
      $ref: ../../common/components.yaml#/components/securitySchemes/BearerAuth

  schemas:
    IssueTicketRequest:
      type: object
      required:
        - reservationId
        - paymentId
      properties:
        reservationId:
          type: string
        paymentId:
          type: string
    Ticket:
      type: object
      required:
        - id
        - reservationId
        - seatId
        - status
        - s3Key
        - qrCode
        - issuedAt
      properties:
        id:
          type: string
        reservationId:
          type: string
        seatId:
          type: string
        status:
          type: string
          enum:
            - issued
            - canceled
            - used
        s3Key:
          type: string
        qrCode:
          type: string
        issuedAt:
          type: string
          format: date-time
    TicketListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
