openapi: 3.1.0
info:
  title: notification-service API
  version: 0.1.0
  description: Medikong notification-service contract draft.

servers:
  - url: http://localhost:8086
    description: local

security:
  - BearerAuth: []

paths:
  /notifications:
    $ref: ./paths/notifications.yaml
  /notifications/{id}:
    $ref: ./paths/notifications_{id}.yaml
  /admin/operation-logs:
    $ref: ./paths/admin_operation-logs.yaml
  /admin/operation-logs/{logId}:
    $ref: ./paths/admin_operation-logs_{logId}.yaml

components:
  securitySchemes:
    BearerAuth:
      $ref: ../../common/components.yaml#/components/securitySchemes/BearerAuth

  schemas:
    Notification:
      type: object
      required:
        - id
        - userId
        - type
        - message
        - eventId
        - createdAt
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum:
            - reservation
            - payment
            - ticket
        message:
          type: string
        eventId:
          type: string
        readAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
    NotificationListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
    OperationLog:
      type: object
      required:
        - id
        - actorId
        - actorRole
        - action
        - resourceType
        - resourceId
        - occurredAt
      properties:
        id:
          type: string
        actorId:
          type: string
        actorRole:
          $ref: ../../common/components.yaml#/components/schemas/UserRole
        action:
          type: string
          examples:
            - concert.sale.pause
        resourceType:
          type: string
          examples:
            - concert
        resourceId:
          type: string
        requestId:
          type: string
        details:
          type: object
          additionalProperties: true
        occurredAt:
          type: string
          format: date-time
    OperationLogListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OperationLog"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
