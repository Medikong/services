openapi: 3.1.0
info:
  title: DropMong Payment Service API
  version: 0.1.0
  description: DropMong mock 결제 승인과 결제 조회 계약.
servers:
  - url: http://payment-service:8083
    description: Docker Compose service DNS
security:
  - BearerAuth: []
paths:
  /payments/mock-approvals:
    post:
      operationId: approveMockPayment
      summary: mock 결제 승인
      parameters:
        - $ref: "../../common/components.yaml#/components/parameters/X-Request-Id"
        - $ref: "../../common/components.yaml#/components/parameters/traceparent"
        - $ref: "../../common/components.yaml#/components/parameters/X-User-Id"
        - $ref: "../../common/components.yaml#/components/parameters/X-User-Role"
        - $ref: "../../common/components.yaml#/components/parameters/Idempotency-Key"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveMockPaymentRequest"
      responses:
        "201":
          description: 결제가 승인되고 payment.approved 이벤트 발행 대상이 되었다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400":
          $ref: "../../common/components.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../../common/components.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../../common/components.yaml#/components/responses/Forbidden"
        "409":
          $ref: "../../common/components.yaml#/components/responses/Conflict"
        "422":
          $ref: "../../common/components.yaml#/components/responses/UnprocessableEntity"
        "500":
          $ref: "../../common/components.yaml#/components/responses/InternalServerError"
  /payments/{paymentId}:
    get:
      operationId: getPayment
      summary: 결제 상세 조회
      parameters:
        - $ref: "../../common/components.yaml#/components/parameters/X-Request-Id"
        - $ref: "../../common/components.yaml#/components/parameters/traceparent"
        - $ref: "../../common/components.yaml#/components/parameters/X-User-Id"
        - $ref: "../../common/components.yaml#/components/parameters/X-User-Role"
        - $ref: "../../common/components.yaml#/components/parameters/paymentId"
      responses:
        "200":
          description: 결제 상세.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "401":
          $ref: "../../common/components.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../../common/components.yaml#/components/responses/Forbidden"
        "404":
          $ref: "../../common/components.yaml#/components/responses/NotFound"
        "500":
          $ref: "../../common/components.yaml#/components/responses/InternalServerError"
components:
  securitySchemes:
    BearerAuth:
      $ref: "../../common/components.yaml#/components/securitySchemes/BearerAuth"
  schemas:
    PaymentStatus:
      type: string
      enum:
        - APPROVED
        - FAILED
    RefundStatus:
      type: string
      enum:
        - REQUESTED
        - PROCESSING
        - COMPLETED
        - FAILED
    ApproveMockPaymentRequest:
      type: object
      required:
        - orderId
        - amount
      properties:
        orderId:
          type: string
          minLength: 1
          maxLength: 64
          examples:
            - order-001
        amount:
          type: integer
          minimum: 0
          examples:
            - 50000
        method:
          type: string
          enum:
            - MOCK_CARD
          default: MOCK_CARD
          examples:
            - MOCK_CARD
    Payment:
      type: object
      required:
        - id
        - orderId
        - userId
        - amount
        - method
        - status
        - createdAt
        - approvedAt
      properties:
        id:
          type: string
          examples:
            - payment-001
        orderId:
          type: string
          minLength: 1
          maxLength: 64
        userId:
          type: string
        amount:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/PaymentStatus"
        method:
          type: string
          enum:
            - MOCK_CARD
        createdAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
    PaymentResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Payment"
    Refund:
      type: object
      required:
        - id
        - orderId
        - paymentId
        - userId
        - amount
        - status
        - reason
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        paymentId:
          type: string
        userId:
          type: string
        amount:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/RefundStatus"
        reason:
          type: string
          minLength: 1
          maxLength: 500
        attempts:
          type: integer
          minimum: 0
          default: 0
        lastError:
          type:
            - string
            - "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type:
            - string
            - "null"
          format: date-time
    RefundResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Refund"
