openapi: 3.1.0
info:
  title: DropMong Catalog Service API
  version: 0.1.0
  description: DropMong 공개 드롭과 상품 조회 계약.
servers:
  - url: http://catalog-service:8081
    description: Docker Compose service DNS
paths:
  /drops:
    get:
      operationId: listDrops
      summary: 공개 드롭 목록 조회
      parameters:
        - $ref: "../../common/components.yaml#/components/parameters/X-Request-Id"
        - $ref: "../../common/components.yaml#/components/parameters/traceparent"
        - $ref: "../../common/components.yaml#/components/parameters/limit"
        - $ref: "../../common/components.yaml#/components/parameters/cursor"
      responses:
        "200":
          description: 공개 드롭 목록.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropListResponse"
        "500":
          $ref: "../../common/components.yaml#/components/responses/InternalServerError"
  /drops/{dropId}:
    get:
      operationId: getDrop
      summary: 공개 드롭 상세 조회
      parameters:
        - $ref: "../../common/components.yaml#/components/parameters/X-Request-Id"
        - $ref: "../../common/components.yaml#/components/parameters/traceparent"
        - $ref: "../../common/components.yaml#/components/parameters/dropId"
      responses:
        "200":
          description: 공개 드롭 상세.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropDetailResponse"
        "404":
          $ref: "../../common/components.yaml#/components/responses/NotFound"
        "500":
          $ref: "../../common/components.yaml#/components/responses/InternalServerError"
components:
  schemas:
    DropStatus:
      type: string
      enum:
        - UPCOMING
        - OPEN
        - SOLD_OUT
        - CLOSED
    ProductSummary:
      type: object
      required:
        - id
        - name
        - price
        - remainingQuantity
      properties:
        id:
          type: string
          examples:
            - product-001
        name:
          type: string
          examples:
            - Medikong Starter Kit
        price:
          type: integer
          minimum: 0
          examples:
            - 50000
        remainingQuantity:
          type: integer
          minimum: 0
          examples:
            - 42
    DropSummary:
      type: object
      required:
        - id
        - title
        - status
        - opensAt
        - products
      properties:
        id:
          type: string
          examples:
            - drop-20260703-001
        title:
          type: string
          examples:
            - DropMong July Limited Drop
        status:
          $ref: "#/components/schemas/DropStatus"
        opensAt:
          type: string
          format: date-time
        closesAt:
          type:
            - string
            - "null"
          format: date-time
        products:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ProductSummary"
    DropDetail:
      allOf:
        - $ref: "#/components/schemas/DropSummary"
        - type: object
          required:
            - description
          properties:
            description:
              type: string
              examples:
                - 한정 수량으로 판매되는 DropMong 드롭입니다.
    DropListResponse:
      type: object
      required:
        - data
        - pageInfo
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DropSummary"
        pageInfo:
          $ref: "../../common/components.yaml#/components/schemas/PageInfo"
    DropDetailResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/DropDetail"
