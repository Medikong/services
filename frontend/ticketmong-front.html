<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticketmong 예매 데모</title>
<style>
  :root {
    --bg:#0f1115;--panel:#181b22;--line:#2a2f3a;
    --text:#e6e8ee;--muted:#9aa3b2;--accent:#6d8cff;
    --ok:#46c08d;--warn:#e0a64a;--err:#e06a6a;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.5;}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
  header h1{font-size:16px;margin:0;}
  .cfg{margin-left:auto;display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted);}
  .cfg input[type=text]{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:5px 8px;border-radius:6px;font-family:var(--mono);font-size:12px;width:280px;}
  main{display:grid;grid-template-columns:1fr 440px;min-height:calc(100vh - 53px);}
  #flow{padding:24px;}
  #log{border-left:1px solid var(--line);background:var(--panel);padding:16px;overflow:auto;}
  @media(max-width:860px){main{grid-template-columns:1fr;}#log{border-left:none;border-top:1px solid var(--line);}}
  .steps{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .steps .s{font-size:12px;color:var(--muted);padding:4px 10px;border:1px solid var(--line);border-radius:999px;}
  .steps .s.active{color:var(--text);border-color:var(--accent);}
  .steps .s.done{color:var(--ok);border-color:var(--ok);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px;}
  .card h2{margin:0 0 12px;font-size:15px;}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px;}
  input[type=text],input[type=password],input[type=email]{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:6px;}
  button{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--text);font-weight:500;}
  button.sm{padding:5px 10px;font-size:12px;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:7px;}
  .meta{font-size:12px;color:var(--muted);}
  .seatgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:8px;}
  .seat{aspect-ratio:1;border:1px solid var(--line);border-radius:5px;background:var(--bg);font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-align:center;padding:2px;}
  .seat.taken{background:#22262f;color:var(--muted);cursor:not-allowed;}
  .seat.selected{border-color:var(--accent);background:rgba(109,140,255,.18);}
  .legend{font-size:11px;color:var(--muted);margin-top:8px;display:flex;gap:12px;}
  .ticket{background:linear-gradient(135deg,#1d2230,#222838);border:1px solid var(--accent);border-radius:12px;padding:18px;display:flex;gap:16px;align-items:center;}
  .qr{width:88px;height:88px;background:#fff;border-radius:6px;flex:none;}
  .banner{padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;}
  .banner.err{background:rgba(224,106,106,.1);border:1px solid var(--err);color:#f0b0b0;}
  .banner.ok{background:rgba(70,192,141,.1);border:1px solid var(--ok);color:#a7e6cd;}
  .banner.info{background:rgba(109,140,255,.1);border:1px solid var(--accent);color:#b0c0ff;}
  .demo-accounts{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .demo-accounts button{font-size:11px;padding:4px 8px;}
  /* log */
  #log h3{margin:0 0 10px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .le{font-family:var(--mono);font-size:11px;border-left:2px solid var(--line);padding:5px 8px;margin-bottom:5px;}
  .le .l1{color:var(--text);}
  .le .kv{color:var(--muted);}
  .le .kv b{color:var(--accent);font-weight:600;}
  .le.action{border-left-color:var(--accent);}
  .le.req{border-left-color:#3a4255;}
  .le.ok{border-left-color:var(--ok);}
  .le.er{border-left-color:var(--err);}
  .le.idem .kv b{color:var(--warn);}
  .tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:#2a2f3a;color:var(--muted);margin-right:5px;}
</style>
</head>
<body>
<header>
  <h1>🎫 Ticketmong <span style="color:var(--muted);font-weight:400;font-size:12px">S0 정상 예매 흐름</span></h1>
  <div class="cfg">
    <label style="margin:0">API Base</label>
    <input id="baseUrl" type="text" value="http://localhost:32407" />
  </div>
</header>
<main>
<section id="flow"></section>
<aside id="log"><h3>Client Log</h3><div id="lb"></div></aside>
</main>
<script>
/* =====================================================================
 * CONFIG  (실제 openapi.json 기준, 경로/필드 추정 없음)
 * ===================================================================== */
const C = {
  base: () => document.getElementById("baseUrl").value.trim(),
  ep: {
    demoAccounts:    { m:"GET",  p:"/auth/demo-accounts" },
    login:           { m:"POST", p:"/auth/login" },
    me:              { m:"GET",  p:"/auth/me" },
    concerts:        { m:"GET",  p:"/concerts" },
    performances:    { m:"GET",  p:"/concerts/{concertId}/performances" },
    seats:           { m:"GET",  p:"/performances/{performanceId}/seats" },
    createReservation:{ m:"POST", p:"/reservations" },
    getReservation:  { m:"GET",  p:"/reservations/{id}" },
    createPayment:   { m:"POST", p:"/payments" },
  },
  pollMs: 1500, pollMax: 8,
};

/* ===== 상태 ===== */
const S = {
  token: null, userId: null,
  concert: null, performance: null, seat: null, reservation: null, payment: null,
  traceparent: null,        // 예매 흐름 단위, 서버에서 받아서 relay (메모리만)
  payIdemKey: null,         // 결제 1건 고정 (재시도해도 동일)
};

/* ===== 유틸 ===== */
const $  = s => document.querySelector(s);
const id = () => crypto.randomUUID();
const wait = ms => new Promise(r => setTimeout(r, ms));
const sh  = v => v ? String(v).slice(0,8) : "—";

function randHex(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return [...a].map(b=>b.toString(16).padStart(2,"0")).join(""); }
function mkTp(traceId, spanId){ return `00-${traceId}-${spanId}-01`; }
function tpTrace(tp){ const m=/^00-([0-9a-f]{32})-/.exec(tp||""); return m?m[1]:null; }

/* ===== 로그 ===== */
function log(kind, title, kv={}){
  const el=document.createElement("div"); el.className="le "+kind;
  const kh=Object.entries(kv).map(([k,v])=>`<span class="kv">${k}=<b>${v}</b></span>`).join(" ");
  const tag={action:"ACTION",req:"→REQ",ok:"←2xx",er:"←ERR",idem:"IDEM"}[kind]||"";
  el.innerHTML=`<div class="l1"><span class="tag">${tag}</span>${title}</div>${kh?`<div>${kh}</div>`:""}`;
  $("#lb").prepend(el);
}
const logAction = name => log("action", `유저 액션: ${name}`);

/* ===== API 클라이언트 ===== */
class ApiError extends Error {
  constructor(status, code, msg){ super(msg); this.status=status; this.code=code; }
}

function buildUrl(key, params={}){
  let p = C.ep[key].p.replace(/\{(\w+)\}/g,(_,k)=>encodeURIComponent(params[k]||""));
  return C.base() + p;
}

async function api(key, { params={}, query={}, body, idemKey }={}){
  const ep = C.ep[key];
  let url = buildUrl(key, params);
  const qs = new URLSearchParams(query).toString(); if(qs) url+="?"+qs;

  const headers = { "Content-Type":"application/json" };
  if(S.token) headers["Authorization"] = `Bearer ${S.token}`;
  if(S.userId) headers["X-User-Id"] = S.userId;
  // traceparent: 저장된 값 있으면 relay, 첫 요청이면 생략 → 서버가 생성
  if(S.traceparent) headers["traceparent"] = S.traceparent;
  if(idemKey) headers["Idempotency-Key"] = idemKey;

  log("req", `${ep.m} ${ep.p}`, {
    traceparent: S.traceparent ? `trace:${sh(tpTrace(S.traceparent))}` : "없음(첫요청)",
    ...(idemKey ? {idemKey: sh(idemKey)} : {}),
  });

  const res = await fetch(url, {
    method: ep.m,
    headers,
    body: body!==undefined ? JSON.stringify(body) : undefined,
  });

  // 응답 header로 traceparent 갱신 (있을 때만; CORS Expose 설정 필요)
  const tp  = res.headers.get("traceparent");
  const xtr = res.headers.get("X-Trace-Id");
  const xrq = res.headers.get("X-Request-Id");
  if(tp) S.traceparent = tp;

  let data = null;
  try { data = await res.json(); } catch {}

  if(!res.ok){
    const code = data?.error?.code || data?.detail || "error";
    const msg  = data?.error?.message || res.statusText || "error";
    log("er", `${res.status} ${code}`, { trace:sh(xtr), req:sh(xrq), msg });
    throw new ApiError(res.status, code, msg);
  }
  log("ok", `${res.status} OK`, { trace:sh(xtr), req:sh(xrq) });
  return data;
}

/* =====================================================================
 * UI
 * ===================================================================== */
const STEPS = ["로그인","공연","회차","좌석","예약","결제","티켓"];
let stepIdx = 0;
const renderSteps = () =>
  `<div class="steps">${STEPS.map((s,i)=>
    `<span class="s ${i===stepIdx?"active":i<stepIdx?"done":""}">${i+1}.${s}</span>`).join("")}</div>`;
const render = inner => $("#flow").innerHTML = renderSteps()+inner;
const banner = (k,m) => `<div class="banner ${k}">${m}</div>`;

/* ----- 1. 로그인 ----- */
async function viewLogin(err){
  stepIdx=0;
  // 데모 계정 로드
  let demos=[];
  try { demos = await api("demoAccounts"); } catch {}

  render(`<div class="card"><h2>로그인</h2>
    ${err ? banner("err",err) : ""}
    <label>이메일</label><input id="em" type="email" value="${demos[0]?.email||""}" />
    <label>비밀번호</label><input id="pw" type="password" value="${demos[0]?.password||""}" />
    ${demos.length ? `<div style="margin-top:6px">
      <span style="font-size:11px;color:var(--muted)">데모 계정:</span>
      <div class="demo-accounts">${demos.map(d=>
        `<button class="ghost sm" data-email="${d.email}" data-pw="${d.password}">${d.displayName} (${d.role})</button>`
      ).join("")}</div></div>` : ""}
    <div style="margin-top:14px"><button id="loginBtn">로그인</button></div>
  </div>`);

  $("#loginBtn").onclick = doLogin;
  $("#flow").querySelectorAll(".demo-accounts button").forEach(btn=>{
    btn.onclick = ()=>{ $("#em").value=btn.dataset.email; $("#pw").value=btn.dataset.pw; };
  });
}

async function doLogin(){
  logAction("로그인"); $("#loginBtn").disabled=true;
  try {
    const r = await api("login", { body:{ email:$("#em").value, password:$("#pw").value } });
    S.token  = r.accessToken;
    S.userId = r.user?.id;
    viewConcerts();
  } catch(e){ viewLogin(`로그인 실패: ${e.code}`); }
}

/* ----- 2. 공연 목록 ----- */
async function viewConcerts(){
  stepIdx=1;
  render(`<div class="card"><h2>공연 선택</h2><div id="cl">불러오는 중...</div></div>`);
  logAction("공연 목록 조회");
  try {
    const r = await api("concerts", { query:{limit:20} });
    if(!r.items?.length){ $("#cl").innerHTML=banner("info","등록된 공연이 없습니다."); return; }
    $("#cl").innerHTML = r.items.map(c=>
      `<div class="row"><div>
        <div>${c.title}</div>
        <div class="meta">${c.venue?.name||""} · ${c.startsAt ? new Date(c.startsAt).toLocaleString("ko-KR") : ""} · ${c.status}</div>
      </div><button onclick="pickConcert('${c.id}','${encodeURIComponent(JSON.stringify(c))}')">선택</button></div>`
    ).join("");
  } catch(e){ $("#cl").innerHTML=banner("err",`조회 실패: ${e.code}`); }
}

function pickConcert(id, enc){
  S.concert = JSON.parse(decodeURIComponent(enc));
  viewPerformances();
}

/* ----- 3. 회차 선택 ----- */
async function viewPerformances(){
  stepIdx=2;
  render(`<div class="card"><h2>회차 선택 — ${S.concert.title}</h2><div id="pl">불러오는 중...</div></div>`);
  logAction("회차 목록 조회");
  try {
    const r = await api("performances", { params:{concertId:S.concert.id}, query:{limit:20} });
    if(!r.items?.length){ $("#pl").innerHTML=banner("info","등록된 회차가 없습니다."); return; }
    $("#pl").innerHTML = r.items.map(p=>
      `<div class="row"><div>
        <div>${new Date(p.startsAt).toLocaleString("ko-KR")}</div>
        <div class="meta">회차 ID: ${p.id} · ${p.status}</div>
      </div><button onclick="pickPerf('${p.id}','${encodeURIComponent(JSON.stringify(p))}')">선택</button></div>`
    ).join("");
  } catch(e){ $("#pl").innerHTML=banner("err",`조회 실패: ${e.code}`); }
}

function pickPerf(id, enc){
  S.performance = JSON.parse(decodeURIComponent(enc));
  viewSeats();
}

/* ----- 4. 좌석 선택 ----- */
async function viewSeats(){
  stepIdx=3;
  render(`<div class="card"><h2>좌석 선택</h2><div id="sl">불러오는 중...</div></div>`);
  logAction("좌석 목록 조회");
  try {
    const r = await api("seats", { params:{performanceId:S.performance.id}, query:{limit:200} });
    if(!r.items?.length){ $("#sl").innerHTML=banner("info","등록된 좌석이 없습니다."); return; }
    const items = r.items;
    $("#sl").innerHTML =
      `<div class="seatgrid">${items.map(s=>
        `<div class="seat ${s.status!=="available"?"taken":""}" data-id="${s.id}" data-status="${s.status}"
          title="${s.section||""} ${s.row||""}${s.number||""}">${s.row||""}${s.number||s.id.slice(-3)}</div>`
      ).join("")}</div>
      <div class="legend"><span>⬜ 선택가능</span><span>⬛ 선택불가</span></div>
      <div style="margin-top:12px"><button id="resvBtn" disabled>이 좌석 예약하기</button></div>`;
    let sel=null;
    $("#sl").querySelectorAll(".seat:not(.taken)").forEach(el=>{
      el.onclick=()=>{ sel?.classList.remove("selected"); el.classList.add("selected"); sel=el; S.seat=el.dataset.id; $("#resvBtn").disabled=false; };
    });
    $("#resvBtn").onclick = doReserve;
  } catch(e){ $("#sl").innerHTML=banner("err",`조회 실패: ${e.code}`); }
}

/* ----- 5. 예약 생성 ----- */
async function doReserve(){
  logAction("예약 생성"); $("#resvBtn").disabled=true;
  try {
    const r = await api("createReservation", {
      body:{ performanceId: S.performance.id, seatId: S.seat, concertId: S.concert.id },
    });
    S.reservation = r;
    S.payIdemKey  = id(); // 이 결제 건에 고정
    viewPay();
  } catch(e){
    if(e.status===409){ alert(`좌석 충돌 (409 ${e.code}). 다른 좌석을 선택해주세요.`); viewSeats(); }
    else { $("#resvBtn").disabled=false; alert(`예약 실패: ${e.code}`); }
  }
}

/* ----- 6. 결제 ----- */
function viewPay(){
  stepIdx=5;
  render(`<div class="card"><h2>결제</h2>
    <div class="meta" style="margin-bottom:10px">
      예약 ${S.reservation.id} · 좌석 ${S.reservation.seatId} · 만료 ${new Date(S.reservation.expiresAt).toLocaleTimeString("ko-KR")}
    </div>
    ${banner("info","💡 결제하기를 두 번 눌러보세요. 같은 Idempotency-Key → 중복 결제 차단이 로그에 찍힙니다.")}
    <label>결제 수단</label>
    <select id="method" style="width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:8px;border-radius:6px">
      <option value="card">신용카드</option><option value="transfer">계좌이체</option>
    </select>
    <label>시뮬레이션</label>
    <select id="sim" style="width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:8px;border-radius:6px">
      <option value="approve">승인</option><option value="fail">실패</option><option value="delay">지연</option>
    </select>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button id="payBtn">결제하기</button>
      <button class="ghost" id="payAgainBtn">한번 더(중복 테스트)</button>
    </div>
    <div id="payMsg"></div>
  </div>`);
  $("#payBtn").onclick    = ()=>doPay(false);
  $("#payAgainBtn").onclick = ()=>doPay(true);
}

async function doPay(again){
  logAction(again?"결제 재시도(중복)":"결제");
  try {
    const r = await api("createPayment", {
      body:{
        reservationId: S.reservation.id,
        concertId: S.concert.id,
        seatId: S.seat,
        amount: 66000,
        method: $("#method").value,
        simulation: $("#sim").value,
      },
      idemKey: S.payIdemKey,  // 재시도해도 동일 → 서버가 중복 차단
    });
    S.payment = r;
    $("#payMsg").innerHTML = banner("ok", `결제 ${r.status} · ${r.id}. 티켓 발행 대기 중...`);
    if(!again) pollTicket();
  } catch(e){ $("#payMsg").innerHTML = banner("err",`결제 실패: ${e.code}`); }
}

/* ----- 7. 티켓 발행 폴링 ----- */
async function pollTicket(){
  stepIdx=6;
  for(let i=0;i<C.pollMax;i++){
    await wait(C.pollMs);
    try {
      const r = await api("getReservation", { params:{id:S.reservation.id} });
      if(r.status==="TICKETED"||r.status==="CONFIRMED") return viewTicket(r);
      if(r.status==="CANCELLED"||r.status==="EXPIRED"){
        $("#payMsg").innerHTML=banner("err",`예약 ${r.status}. 처음부터 다시 시도해주세요.`); return;
      }
    } catch {}
  }
  $("#payMsg").innerHTML=banner("err","티켓 발행이 지연되고 있어요. 잠시 후 확인해주세요.");
}

function viewTicket(r){
  stepIdx=6;
  render(`<div class="card"><h2>🎟 발행 완료</h2>
    <div class="ticket">
      <svg class="qr" viewBox="0 0 10 10">${qr()}</svg>
      <div>
        <div style="font-size:15px;font-weight:700">${S.concert.title}</div>
        <div class="meta">${S.concert.venue?.name||""} · ${S.performance?.startsAt ? new Date(S.performance.startsAt).toLocaleString("ko-KR") : ""}</div>
        <div style="margin-top:8px">좌석 <b>${r.seatId}</b></div>
        <div class="meta">예약 ${r.id} · 결제 ${S.payment?.id||""}</div>
      </div>
    </div>
    <div style="margin-top:14px">
      <button class="ghost" onclick="resetAll()">처음부터 다시 (traceparent 폐기)</button>
    </div>
  </div>`);
}

function resetAll(){
  // traceparent 폐기 (흐름 종료)
  Object.keys(S).forEach(k=>S[k]=null);
  viewLogin();
}

function qr(){ let s='<rect width="10" height="10" fill="#fff"/>'; for(let y=0;y<10;y++) for(let x=0;x<10;x++) if((x*7+y*3+x*y)%3===0) s+=`<rect x="${x}" y="${y}" width="1" height="1" fill="#0f1115"/>`; return s; }

/* 시작 */
viewLogin();
</script>
</body>
</html>
