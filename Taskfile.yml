version: "3"

vars:
  UV: '{{default "uv" .UV}}'
  UV_PYTHON: '{{default "python3.13" .UV_PYTHON}}'
  DEV_VENV_DIR: '{{default ".venv" .DEV_VENV_DIR}}'
  DEV_OVERRIDES: '{{default "requirements-dev-overrides.txt" .DEV_OVERRIDES}}'
  IMAGE_REGISTRY: '{{default "10.10.10.10:5000" .IMAGE_REGISTRY}}'
  IMAGE_NAMESPACE: '{{default "" .IMAGE_NAMESPACE}}'
  IMAGE_TAG: '{{default "latest" .IMAGE_TAG}}'
  IMAGE_SERVICES: '{{default "" .IMAGE_SERVICES}}'
  DEV_IMAGE_REGISTRY: '{{default "localhost:5001" .DEV_IMAGE_REGISTRY}}'
  DEV_IMAGE_NAMESPACE: '{{default "" .DEV_IMAGE_NAMESPACE}}'
  DEV_IMAGE_TAG: '{{default "dev" .DEV_IMAGE_TAG}}'
  DOCKER_BUILD_PLATFORMS: '{{default "linux/amd64,linux/arm64" .DOCKER_BUILD_PLATFORMS}}'
  DOCKER_BUILD_CACHE_FROM: '{{default "" .DOCKER_BUILD_CACHE_FROM}}'
  DOCKER_BUILD_CACHE_TO: '{{default "" .DOCKER_BUILD_CACHE_TO}}'
  PYTHON_BIN: '{{default "python3" .PYTHON_BIN}}'
  PURCHASE_POSTGRES_COMPOSE_PROJECT: '{{default "dropmong-purchase-postgres" .PURCHASE_POSTGRES_COMPOSE_PROJECT}}'
  INTEREST_POSTGRES_COMPOSE_PROJECT: '{{default "dropmong-interest-postgres" .INTEREST_POSTGRES_COMPOSE_PROJECT}}'
  PURCHASE_LIFECYCLE_COMPOSE_PREFIX: '{{default "dropmong-purchase-lifecycle" .PURCHASE_LIFECYCLE_COMPOSE_PREFIX}}'
  SERVICE_LIST_SCRIPT: '{{default "scripts/list_services.sh" .SERVICE_LIST_SCRIPT}}'
  GO_TEST_PACKAGES: '{{default "./packages/go-audit/... ./packages/go-platform/... ./packages/go-authz/... ./packages/go-contracts/... ./services/auth-service/... ./services/coupon-service/... ./services/go-reference-service/... ./services/user-service/..." .GO_TEST_PACKAGES}}'
  GO_BENCH_TIME: '{{default "1s" .GO_BENCH_TIME}}'

includes:
  tests:
    taskfile: ./tests/Taskfile.yml
    dir: .

tasks:
  default:
    desc: Show available service commands.
    cmds:
      - task --list

  help:
    desc: Show available service commands.
    cmds:
      - task --list

  list:
    desc: Show available service commands.
    cmds:
      - task --list

  install:
    desc: Sync the unified uv development environment.
    cmds:
      - |
        set -e
        uv_cmd='{{.UV}}'
        python_spec='{{.UV_PYTHON}}'
        venv_dir='{{.DEV_VENV_DIR}}'
        overrides='{{.DEV_OVERRIDES}}'
        if ! command -v "${uv_cmd}" >/dev/null 2>&1; then
          printf '%s\n' "${uv_cmd} command not found. Install uv or set UV=/path/to/uv." >&2
          exit 1
        fi
        "${uv_cmd}" venv --python "${python_spec}" "${venv_dir}" --allow-existing
        venv_python="${venv_dir}/bin/python"
        if [ ! -x "${venv_python}" ]; then
          venv_python="${venv_dir}/Scripts/python.exe"
        fi
        service_list='{{.SERVICE_LIST_SCRIPT}}'
        install_args=""
        for project in $(find packages -mindepth 2 -maxdepth 2 -name pyproject.toml | sort) $(sh "${service_list}" list --mode pyprojects --format shell); do
          install_args="${install_args} -r ${project} --group ${project}:test"
        done
        if [ -z "${install_args}" ]; then
          printf '%s\n' 'No package or service pyproject.toml files found; uv install skipped.'
          exit 0
        fi
        "${uv_cmd}" pip install --python "${venv_python}" --exact --strict --overrides "${overrides}" ${install_args}
        printf 'Unified uv development environment is ready at %s.\n' "${venv_dir}"

  test-runner-build:
    desc: Build service-scoped Docker Python test runner images. Optionally set SERVICE=<service-name>.
    cmds:
      - task: tests:test-runner-build
        vars:
          SERVICE: '{{default "" .SERVICE}}'

  test-service:
    desc: Run one service pytest in its Docker Python runner with SERVICE=<service-name>.
    cmds:
      - task: tests:test-service
        vars:
          SERVICE: '{{default "" .SERVICE}}'

  test-services:
    desc: Run selected service pytest suites in parallel with service-scoped Docker runners.
    cmds:
      - task: tests:test-services
        vars:
          SERVICES: '{{default "" .SERVICES}}'

  test-unit:
    desc: Run all managed service pytest suites in service-scoped Docker runners.
    cmds:
      - task: tests:test-unit

  test:
    desc: Run the default test target.
    cmds:
      - task: tests:test-unit

  test-go-unit:
    desc: Run Go unit tests for shared packages and Go services.
    cmds:
      - go test {{.GO_TEST_PACKAGES}}

  test-go-integration:
    desc: Run Go integration tests with the integration build tag.
    cmds:
      - go test -tags=integration {{.GO_TEST_PACKAGES}}

  test-go-benchmark:
    desc: Run Go benchmarks with the benchmark build tag.
    cmds:
      - go test -tags=benchmark -run '^$' -bench . -benchmem -benchtime '{{.GO_BENCH_TIME}}' {{.GO_TEST_PACKAGES}}

  dropmong-web-install:
    desc: Install the reproducible DropMong web dependencies.
    dir: services/dropmong-web
    cmds:
      - corepack pnpm install --frozen-lockfile

  dropmong-web-lint:
    desc: Lint the DropMong buyer web application.
    dir: services/dropmong-web
    cmds:
      - corepack pnpm lint

  dropmong-web-typecheck:
    desc: Type-check the DropMong buyer web application.
    dir: services/dropmong-web
    cmds:
      - corepack pnpm typecheck

  dropmong-web-test:
    desc: Run DropMong web unit tests.
    dir: services/dropmong-web
    cmds:
      - corepack pnpm test

  dropmong-web-build:
    desc: Build the DropMong buyer web application for production.
    dir: services/dropmong-web
    cmds:
      - corepack pnpm build

  dropmong-web-check:
    desc: Run the DropMong web static verification suite.
    deps:
      - dropmong-web-install
    cmds:
      - task: dropmong-web-lint
      - task: dropmong-web-typecheck
      - task: dropmong-web-test
      - task: dropmong-web-build

  dropmong-web-e2e-install:
    desc: Install the Chromium browser used by DropMong web browser tests.
    dir: services/dropmong-web
    cmds:
      - corepack pnpm test:e2e:install

  dropmong-web-e2e:
    desc: Run mobile and desktop DropMong web purchase browser tests.
    dir: services/dropmong-web
    cmds:
      - corepack pnpm test:e2e

  dropmong-web-image-build:
    desc: Build the local DropMong web Docker image without publishing it.
    cmds:
      - docker build -f services/dropmong-web/Dockerfile -t dropmong-web:local .

  dropmong-web-docker-smoke:
    desc: Build the local DropMong web image and verify its readiness and container health.
    cmds:
      - |
        set -eu
        image='dropmong-web:local'
        container="dropmong-web-smoke-$$"
        cleanup() {
          docker rm -f "${container}" >/dev/null 2>&1 || true
        }
        trap cleanup EXIT
        docker build -f services/dropmong-web/Dockerfile -t "${image}" .
        docker run --detach --name "${container}" --publish 127.0.0.1::3000 \
          --env DEV_MOCK_MODE=true \
          --env APP_ORIGIN=http://localhost:3000 \
          --env SESSION_COOKIE_SECRET=local-docker-session-secret-must-have-at-least-thirty-two-characters \
          "${image}" >/dev/null
        port="$(docker port "${container}" 3000/tcp | sed 's/.*://')"
        for attempt in $(seq 1 35); do
          health="$(docker inspect --format '{{"{{"}}.State.Health.Status{{"}}"}}' "${container}")"
          if [ "${health}" = healthy ] && curl --fail --silent --show-error "http://127.0.0.1:${port}/readyz" >/dev/null; then
            curl --fail --silent --show-error "http://127.0.0.1:${port}/healthz" | grep -q '"status":"ok"'
            curl --fail --silent --show-error "http://127.0.0.1:${port}/metrics" | grep -q '^service_ready'
            docker logs "${container}" | grep -q '"message":"web request completed"'
            exit 0
          fi
          sleep 1
        done
        docker logs "${container}" >&2
        exit 1

  auth-openapi-sync:
    desc: Bundle the auth OpenAPI source of truth from the sibling archive checkout.
    cmds:
      - ./services/auth-service/scripts/sync-openapi.sh

  auth-openapi-check:
    desc: Verify that the auth OpenAPI bundle snapshot matches the sibling archive checkout.
    cmds:
      - ./services/auth-service/scripts/check-openapi.sh

  coupon-openapi-sync:
    desc: Bundle the coupon OpenAPI source of truth from the sibling archive checkout.
    cmds:
      - ./services/coupon-service/scripts/sync-openapi.sh

  coupon-openapi-check:
    desc: Verify that the coupon OpenAPI bundle snapshot matches the sibling archive checkout.
    cmds:
      - ./services/coupon-service/scripts/check-openapi.sh

  user-service-unit:
    desc: Run user-service unit tests with the race detector.
    cmds:
      - go test -race ./services/user-service/...

  user-service-vet:
    desc: Run Go static checks for user-service.
    cmds:
      - go vet ./services/user-service/...

  user-service-integration:
    desc: Run user-service HTTP and PostgreSQL Testcontainers integration tests.
    cmds:
      - go test -tags=integration -count=1 ./services/user-service/tests/integration

  user-service-image-build:
    desc: Build the local user-service server and migration image.
    cmds:
      - docker build -f services/user-service/Dockerfile -t user-service:dev .

  user-service-check:
    desc: Run the standard user-service code and database verification suite.
    cmds:
      - task: user-service-unit
      - task: user-service-vet
      - task: user-service-integration

  test-all:
    desc: Run unit tests and Docker Compose E2E tests.
    cmds:
      - task: tests:test-unit
      - task: test-e2e

  test-e2e:
    desc: Run Docker Compose E2E tests. Optionally set SCENARIO=<scenario-name>.
    cmds:
      - task: tests:e2e
        vars:
          SCENARIO: '{{default "" .SCENARIO}}'

  purchase-e2e-with-metrics:
    desc: Run purchase scenarios 04/05/06 and assert business metrics.
    cmds:
      - task: tests:purchase-e2e-with-metrics
        vars:
          E2E_REPORT_NAME: '{{default "purchase-metrics" .E2E_REPORT_NAME}}'

  purchase-e2e-with-traces:
    desc: Run happy purchase E2E and assert service traces in Tempo.
    cmds:
      - task: tests:purchase-e2e-with-traces
        vars:
          E2E_REPORT_NAME: '{{default "purchase-traces" .E2E_REPORT_NAME}}'

  purchase-e2e-with-kafka-traces:
    desc: Run happy purchase E2E and assert Kafka span graph traces in Tempo.
    cmds:
      - task: tests:purchase-e2e-with-kafka-traces
        vars:
          E2E_REPORT_NAME: '{{default "purchase-kafka-traces" .E2E_REPORT_NAME}}'

  purchase-e2e-with-log-correlation:
    desc: Run purchase log-correlation assertions in Loki.
    cmds:
      - task: tests:purchase-e2e-with-log-correlation
        vars:
          E2E_COMPOSE_PROJECT: '{{default "dropmong-e2e" .E2E_COMPOSE_PROJECT}}'

  purchase-e2e-with-notification-metrics:
    desc: Assert notification business metrics and Kafka consumer lag recovery.
    cmds:
      - task: tests:purchase-e2e-with-notification-metrics

  purchase-e2e-concurrency:
    desc: Run the purchase concurrency smoke and verify active database reservations.
    cmds:
      - task: tests:purchase-e2e-concurrency
        vars:
          PURCHASE_CONCURRENCY_COMPOSE_PROJECT: '{{default "dropmong-purchase-concurrency" .PURCHASE_CONCURRENCY_COMPOSE_PROJECT}}'

  payment-failure-idempotency:
    desc: Run duplicate payment-failure HTTP and Kafka redelivery Docker E2E gate.
    cmds:
      - task: tests:payment-failure-idempotency
        vars:
          PAYMENT_FAILURE_IDEMPOTENCY_COMPOSE_PROJECT: '{{default "dropmong-payment-failure-idempotency" .PAYMENT_FAILURE_IDEMPOTENCY_COMPOSE_PROJECT}}'
          PAYMENT_FAILURE_IDEMPOTENCY_SMOKE_IMAGE: '{{default "" .PAYMENT_FAILURE_IDEMPOTENCY_SMOKE_IMAGE}}'

  test-purchase-postgres-integration:
    desc: Run purchase migration and integration tests against required PostgreSQL 16.
    cmds:
      - task: tests:test-purchase-postgres-integration
        vars:
          PURCHASE_POSTGRES_COMPOSE_PROJECT: '{{.PURCHASE_POSTGRES_COMPOSE_PROJECT}}'

  test-interest-postgres-integration:
    desc: Run interest-service integration tests against required PostgreSQL 16.
    cmds:
      - task: tests:test-interest-postgres-integration
        vars:
          INTEREST_POSTGRES_COMPOSE_PROJECT: '{{.INTEREST_POSTGRES_COMPOSE_PROJECT}}'

  test-purchase-contracts:
    desc: Run shared purchase event and OpenAPI contract tests.
    cmds:
      - task: tests:test-purchase-contracts

  purchase-lifecycle-e2e:
    desc: Run durable purchase lifecycle gates with isolated Compose projects.
    cmds:
      - task: tests:purchase-lifecycle-e2e
        vars:
          PURCHASE_LIFECYCLE_COMPOSE_PREFIX: '{{.PURCHASE_LIFECYCLE_COMPOSE_PREFIX}}'

  purchase-internal-regression:
    desc: Run the Gateway-excluded, internal-only purchase regression from committed HEAD.
    env:
      INTERNAL_REGRESSION_SOURCE_ROOT: '{{.TASKFILE_DIR}}'
      INTERNAL_REGRESSION_PROJECT_PREFIX: '{{default "dropmong-g009-internal-regression" .INTERNAL_REGRESSION_PROJECT_PREFIX}}'
      INTERNAL_REGRESSION_TASK_BIN: '{{default "" .INTERNAL_REGRESSION_TASK_BIN}}'
      INTERNAL_REGRESSION_START_GATE: '{{default "1" .INTERNAL_REGRESSION_START_GATE}}'
    cmds:
      - '"{{.PYTHON_BIN}}" "{{.TASKFILE_DIR}}/tests/e2e/scripts/run_purchase_internal_regression.py"'


  app-images-build:
    desc: Build service and dashboard Docker images.
    cmds:
      - |
        set -eu
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        service_list='{{.SERVICE_LIST_SCRIPT}}'
        if [ -z "${image_registry}" ]; then
          printf '%s\n' 'IMAGE_REGISTRY is required, for example: task app-images-build IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        if [ -z "${image_tag}" ]; then
          printf '%s\n' 'IMAGE_TAG is required, for example: task app-images-build IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        build_platforms='{{.DOCKER_BUILD_PLATFORMS}}'
        if [ -z "${build_platforms}" ]; then
          printf '%s\n' 'DOCKER_BUILD_PLATFORMS is required.' >&2
          exit 2
        fi
        cache_args=""
        cache_from='{{.DOCKER_BUILD_CACHE_FROM}}'
        cache_to='{{.DOCKER_BUILD_CACHE_TO}}'
        while IFS= read -r cache; do
          if [ -n "${cache}" ]; then
            cache_args="${cache_args} --cache-from ${cache}"
          fi
        done <<EOF
        ${cache_from}
        EOF
        while IFS= read -r cache; do
          if [ -n "${cache}" ]; then
            cache_args="${cache_args} --cache-to ${cache}"
          fi
        done <<EOF
        ${cache_to}
        EOF
        build_image() {
          service="$1"
          printf 'building %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
          docker buildx build ${cache_args} --platform "${build_platforms}" --push -f "services/${service}/Dockerfile" -t "${image_prefix}/${service}:${image_tag}" .
        }
        services='{{.IMAGE_SERVICES}}'
        if [ -z "${services}" ]; then
          services="$(sh "${service_list}" list --mode images --format shell)"
        fi
        if [ -z "${services}" ]; then
          printf '%s\n' 'No managed service Docker images found; image build skipped.'
          exit 0
        fi
        pids=""
        for service in ${services}; do
          build_image "${service}" &
          pids="${pids} $!"
        done
        failed=0
        for pid in ${pids}; do
          if ! wait "${pid}"; then
            failed=1
          fi
        done
        if [ "${failed}" -ne 0 ]; then
          exit 1
        fi

  app-images-push:
    desc: Build images and push them to the registry.
    deps:
      - app-images-build
    cmds:
      - |
        set -eu
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        service_list='{{.SERVICE_LIST_SCRIPT}}'
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        pids=""
        services='{{.IMAGE_SERVICES}}'
        if [ -z "${services}" ]; then
          services="$(sh "${service_list}" list --mode images --format shell)"
        fi
        if [ -z "${services}" ]; then
          printf '%s\n' 'No managed service Docker images found; image push skipped.'
          exit 0
        fi
        for service in ${services}; do
          (
            printf 'pushing %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
            docker push "${image_prefix}/${service}:${image_tag}"
          ) &
          pids="${pids} $!"
        done
        failed=0
        for pid in ${pids}; do
          if ! wait "${pid}"; then
            failed=1
          fi
        done
        if [ "${failed}" -ne 0 ]; then
          exit 1
        fi

  app-image-build:
    desc: Build one service or dashboard Docker image with SERVICE=<image-name>.
    cmds:
      - |
        set -eu
        requested='{{default "" .SERVICE}}'
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        service_list='{{.SERVICE_LIST_SCRIPT}}'
        if [ -z "${requested}" ]; then
          printf '%s\n' 'SERVICE is required, for example: task app-image-build SERVICE=<service-name> IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        if [ -z "${image_registry}" ]; then
          printf '%s\n' 'IMAGE_REGISTRY is required, for example: task app-image-build SERVICE=<service-name> IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        if [ -z "${image_tag}" ]; then
          printf '%s\n' 'IMAGE_TAG is required, for example: task app-image-build SERVICE=<service-name> IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        normalize_service() {
          raw="$1"
          for candidate in $(sh "${service_list}" list --mode images --format shell); do
            if [ "${raw}" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
            if [ "${raw}-service" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
          done
          return 1
        }
        if ! service="$(normalize_service "${requested}")"; then
          printf 'Unknown SERVICE=%s. Add services/%s/Dockerfile or adjust SERVICE_INCLUDE/SERVICE_EXCLUDE.\n' "${requested}" "${requested}" >&2
          exit 2
        fi
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        build_platforms='{{.DOCKER_BUILD_PLATFORMS}}'
        if [ -z "${build_platforms}" ]; then
          printf '%s\n' 'DOCKER_BUILD_PLATFORMS is required.' >&2
          exit 2
        fi
        cache_args=""
        cache_from='{{.DOCKER_BUILD_CACHE_FROM}}'
        cache_to='{{.DOCKER_BUILD_CACHE_TO}}'
        while IFS= read -r cache; do
          if [ -n "${cache}" ]; then
            cache_args="${cache_args} --cache-from ${cache}"
          fi
        done <<EOF
        ${cache_from}
        EOF
        while IFS= read -r cache; do
          if [ -n "${cache}" ]; then
            cache_args="${cache_args} --cache-to ${cache}"
          fi
        done <<EOF
        ${cache_to}
        EOF
        build_output='{{.DOCKER_BUILD_OUTPUT}}'
        build_output_arg='--push'
        if [ -n "${build_output}" ]; then
          build_output_arg="--output ${build_output}"
        fi
        printf 'building %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
        docker buildx build ${cache_args} --platform "${build_platforms}" ${build_output_arg} -f "services/${service}/Dockerfile" -t "${image_prefix}/${service}:${image_tag}" .

  app-image-push:
    desc: Build and push one service or dashboard Docker image with SERVICE=<image-name>.
    cmds:
      - task app-image-build SERVICE={{.SERVICE}} IMAGE_REGISTRY={{.IMAGE_REGISTRY}} IMAGE_NAMESPACE={{.IMAGE_NAMESPACE}} IMAGE_TAG={{.IMAGE_TAG}}
      - |
        set -eu
        requested='{{default "" .SERVICE}}'
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        service_list='{{.SERVICE_LIST_SCRIPT}}'
        normalize_service() {
          raw="$1"
          for candidate in $(sh "${service_list}" list --mode images --format shell); do
            if [ "${raw}" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
            if [ "${raw}-service" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
          done
          return 1
        }
        if ! service="$(normalize_service "${requested}")"; then
          printf 'Unknown SERVICE=%s. Add services/%s/Dockerfile or adjust SERVICE_INCLUDE/SERVICE_EXCLUDE.\n' "${requested}" "${requested}" >&2
          exit 2
        fi
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        printf 'pushing %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
        docker push "${image_prefix}/${service}:${image_tag}"

  deploy:tag:
    desc: Create and push a deploy tag with SERVICE=<service|changed|all> BUMP=<patch|minor|major>. Set DRY_RUN=true to preview.
    cmds:
      - bash scripts/deploy_tag.sh
    env:
      SERVICE: '{{default "" .SERVICE}}'
      BUMP: '{{default "patch" .BUMP}}'
      DRY_RUN: '{{default "false" .DRY_RUN}}'
      DEPLOY_ENV: '{{default "dev" .DEPLOY_ENV}}'

  dev-images-build:
    desc: Build Docker Desktop dev images with DEV_IMAGE_* variables.
    cmds:
      - |
        set -eu
        local_docker_build_platform() {
          arch="$(uname -m 2>/dev/null || true)"
          case "${arch}" in
            arm64|aarch64)
              printf '%s\n' 'linux/arm64'
              return 0
              ;;
            x86_64|amd64)
              printf '%s\n' 'linux/amd64'
              return 0
              ;;
          esac
          docker_arch="$(docker info --format '{{"{{"}}.Architecture{{"}}"}}' 2>/dev/null || true)"
          case "${docker_arch}" in
            arm64|aarch64)
              printf '%s\n' 'linux/arm64'
              return 0
              ;;
            x86_64|amd64)
              printf '%s\n' 'linux/amd64'
              return 0
              ;;
          esac
          printf 'Unsupported local build architecture: uname=%s docker=%s\n' "${arch}" "${docker_arch}" >&2
          return 2
        }
        dev_build_platform="$(local_docker_build_platform)"
        printf 'Using local Docker build platform: %s\n' "${dev_build_platform}"
        task app-images-build \
          IMAGE_REGISTRY={{.DEV_IMAGE_REGISTRY}} \
          IMAGE_NAMESPACE={{.DEV_IMAGE_NAMESPACE}} \
          IMAGE_TAG={{.DEV_IMAGE_TAG}} \
          DOCKER_BUILD_PLATFORMS="${dev_build_platform}"

  dev-images-push:
    desc: Push Docker Desktop dev images with DEV_IMAGE_* variables.
    cmds:
      - |
        set -eu
        local_docker_build_platform() {
          arch="$(uname -m 2>/dev/null || true)"
          case "${arch}" in
            arm64|aarch64)
              printf '%s\n' 'linux/arm64'
              return 0
              ;;
            x86_64|amd64)
              printf '%s\n' 'linux/amd64'
              return 0
              ;;
          esac
          docker_arch="$(docker info --format '{{"{{"}}.Architecture{{"}}"}}' 2>/dev/null || true)"
          case "${docker_arch}" in
            arm64|aarch64)
              printf '%s\n' 'linux/arm64'
              return 0
              ;;
            x86_64|amd64)
              printf '%s\n' 'linux/amd64'
              return 0
              ;;
          esac
          printf 'Unsupported local build architecture: uname=%s docker=%s\n' "${arch}" "${docker_arch}" >&2
          return 2
        }
        dev_build_platform="$(local_docker_build_platform)"
        printf 'Using local Docker build platform: %s\n' "${dev_build_platform}"
        task app-images-push \
          IMAGE_REGISTRY={{.DEV_IMAGE_REGISTRY}} \
          IMAGE_NAMESPACE={{.DEV_IMAGE_NAMESPACE}} \
          IMAGE_TAG={{.DEV_IMAGE_TAG}} \
          DOCKER_BUILD_PLATFORMS="${dev_build_platform}"
