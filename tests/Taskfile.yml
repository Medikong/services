  purchase-e2e-with-notification-metrics:
    desc: Assert notification consumer outcomes and committed Kafka lag.
    cmds:
      - |
        set -e
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        compose_cmd='{{.DOCKER_COMPOSE}}'
        project='{{.E2E_COMPOSE_PROJECT}}-notification-metrics'
        context="${repo_root}/tests/tmp/notification-metrics-context"
        rm -rf "${context}"
        git clone --no-hardlinks --quiet "${repo_root}" "${context}"
        file="${context}/{{.E2E_COMPOSE_FILE}}"
        services="postgres kafka kafka-init catalog-service order-service payment-service notification-service"
        trap '${compose_cmd} -p "${project}" -f "${file}" down -v --remove-orphans; rm -rf "${context}"' EXIT
        CATALOG_SERVICE_PORT=0 \
        ORDER_SERVICE_PORT=0 \
        PAYMENT_SERVICE_PORT=0 \
        NOTIFICATION_SERVICE_PORT=0 \
          ${compose_cmd} -p "${project}" -f "${file}" up -d --build --wait --wait-timeout {{.E2E_WAIT_TIMEOUT_SECONDS}} ${services}
        ${compose_cmd} -p "${project}" -f "${file}" build purchase-newman
        run_collection() {
          ${compose_cmd} -p "${project}" -f "${file}" run --rm --no-deps purchase-newman run "scenarios/$1.postman_collection.json" \
            -e newman/docker.postman_environment.json \
            --env-var catalogServiceUrl=http://catalog-service:8081 \
            --env-var orderServiceUrl=http://order-service:8082 \
            --env-var paymentServiceUrl=http://payment-service:8083 \
            --env-var notificationServiceUrl=http://notification-service:8084 \
            --reporters cli
        }
        wait_for_zero_lag() {
          attempts=0
          while [ "${attempts}" -lt 30 ]; do
            output="$(${compose_cmd} -p "${project}" -f "${file}" exec -T kafka /opt/kafka/bin/kafka-consumer-groups.sh \
              --bootstrap-server kafka:29092 --group notification-service-notification-requested --describe 2>&1)"
            lag=""
            while read -r group topic partition current_offset log_end_offset current_lag rest; do
              if [ "${group}" = "notification-service-notification-requested" ] && [ "${topic}" = "notification.requested" ]; then
                lag="${current_lag}"
              fi
            done <<EOF
        ${output}
        EOF
            if [ "${lag}" = "0" ]; then
              printf '%s\n' "${output}"
              return 0
            fi
            attempts=$((attempts + 1))
            sleep 2
          done
          printf '%s\n' "${output}" >&2
          return 1
        }
        run_collection 04-customer-drop-purchase-happy-path
        wait_for_zero_lag
        run_collection 10-notification-metrics-happy
        ${compose_cmd} -p "${project}" -f "${file}" run --rm --no-deps notification-replay-producer
        wait_for_zero_lag
        run_collection 11-notification-metrics-replay

  purchase-e2e-concurrency:
    desc: Run the purchase concurrency smoke and verify active database reservations.
    env:
      PURCHASE_CONCURRENCY_ROOT_DIR: '{{.ROOT_DIR}}'
      PURCHASE_CONCURRENCY_PYTHON_BIN: '{{.PYTHON_BIN}}'
      PURCHASE_CONCURRENCY_DOCKER_COMPOSE: '{{.DOCKER_COMPOSE}}'
      PURCHASE_CONCURRENCY_PROJECT: '{{.PURCHASE_CONCURRENCY_COMPOSE_PROJECT}}'
      PURCHASE_CONCURRENCY_COMPOSE_FILE: '{{.ROOT_DIR}}/{{.E2E_COMPOSE_FILE}}'
      PURCHASE_CONCURRENCY_IMAGE: '{{.PURCHASE_CONCURRENCY_SMOKE_IMAGE}}'
      PURCHASE_CONCURRENCY_WAIT_TIMEOUT_SECONDS: '{{.E2E_WAIT_TIMEOUT_SECONDS}}'
    cmds:
      - |
        set -e
        repo_root="$(cd "${PURCHASE_CONCURRENCY_ROOT_DIR}" && pwd -P)"
        python_bin="${PURCHASE_CONCURRENCY_PYTHON_BIN}"
        project="${PURCHASE_CONCURRENCY_PROJECT}"
        file="${PURCHASE_CONCURRENCY_COMPOSE_FILE}"
        smoke_image="${PURCHASE_CONCURRENCY_IMAGE}"
        wait_timeout_seconds="${PURCHASE_CONCURRENCY_WAIT_TIMEOUT_SECONDS}"
        die() {
          printf '%s\n' "$1" >&2
          exit 2
        }
        validate_name() {
          label="$1"
          value="$2"
          case "${value}" in
            ""|*[!A-Za-z0-9._-]*)
              die "${label} must match [A-Za-z0-9._-]+: ${value}"
              ;;
          esac
        }
        validate_positive_integer() {
          label="$1"
          value="$2"
          case "${value}" in
            ""|*[!0123456789]*|0*)
              die "${label} must be a positive integer: ${value}"
              ;;
          esac
        }
        validate_image() {
          value="$1"
          case "${value}" in
            ""|[!A-Za-z0-9]*|*[!A-Za-z0-9._/:@-]*)
              die "PURCHASE_CONCURRENCY_SMOKE_IMAGE must be a container image reference and cannot begin with -: ${value}"
              ;;
          esac
        }
        compose() {
          case "${PURCHASE_CONCURRENCY_DOCKER_COMPOSE}" in
            "docker compose")
              docker compose "$@"
              ;;
            "docker-compose")
              docker-compose "$@"
              ;;
            *)
              die "DOCKER_COMPOSE must be exactly 'docker compose' or 'docker-compose'"
              ;;
          esac
        }
        validate_name PURCHASE_CONCURRENCY_COMPOSE_PROJECT "${project}"
        validate_positive_integer E2E_WAIT_TIMEOUT_SECONDS "${wait_timeout_seconds}"
        validate_image "${smoke_image}"
        run_suffix="$("${python_bin}" -c 'import time, uuid; print(time.strftime("%Y%m%dT%H%M%SZ", time.gmtime()) + "-" + uuid.uuid4().hex[:12], end="")')"
        run_id="purchase-concurrency-${run_suffix}"
        validate_name PURCHASE_CONCURRENCY_RUN_ID "${run_id}"
        cleanup() {
          status="$?"
          set +e
          compose -p "${project}" -f "${file}" down -v --remove-orphans
          cleanup_status="$?"
          if [ "${status}" -ne 0 ]; then
            exit "${status}"
          fi
          exit "${cleanup_status}"
        }
        trap cleanup EXIT
        compose -p "${project}" -f "${file}" down -v --remove-orphans
        compose -p "${project}" -f "${file}" up -d --build --wait \
          --wait-timeout "${wait_timeout_seconds}" postgres kafka kafka-init order-service
        set +e
        smoke_json="$(docker run --rm --network "${project}_default" \
          -e PURCHASE_CONCURRENCY_RUN_ID="${run_id}" \
          -v "${repo_root}/tests/e2e/scripts:/scripts:ro" \
          "${smoke_image}" python /scripts/purchase-concurrency-smoke.py)"
        smoke_status="$?"
        set -e
        printf '%s\n' "${smoke_json}"
        set +e
        db_result="$(compose -p "${project}" -f "${file}" exec -T postgres \
          psql -U app -d order_service -At -F '|' \
          -c "SELECT COUNT(*), COALESCE(SUM(quantity), 0) FROM orders WHERE status IN ('PENDING_PAYMENT', 'CONFIRMED');")"
        db_status="$?"
        set -e
        printf 'active_orders|reserved_quantity=%s\n' "${db_result}"
        status=0
        if [ "${smoke_status}" -ne 0 ]; then
          status="${smoke_status}"
        fi
        if [ "${db_status}" -ne 0 ]; then
          if [ "${status}" -eq 0 ]; then
            status="${db_status}"
          fi
        elif [ "${db_status}" -eq 0 ]; then
          active_orders="${db_result%%|*}"
          reserved_quantity="${db_result#*|}"
          db_result_invalid=0
          case "${db_result}" in
            *'|'*)
              ;;
            *)
              db_result_invalid=1
              ;;
          esac
          case "${active_orders}" in
            ""|*[!0123456789]*)
              db_result_invalid=1
              ;;
          esac
          case "${reserved_quantity}" in
            ""|*[!0123456789]*)
              db_result_invalid=1
              ;;
          esac
          if [ "${db_result_invalid}" -ne 0 ]; then
            printf 'Invalid database result; expected active_orders|reserved_quantity, got: %s\n' "${db_result}" >&2
            if [ "${status}" -eq 0 ]; then
              status=1
            fi
          elif [ "${active_orders}" -ne 4 ] || [ "${reserved_quantity}" -ne 40 ] || [ "${reserved_quantity}" -gt 42 ]; then
            printf 'Concurrency database assertion failed: expected 4|40 with reserved_quantity <= 42, got %s\n' "${db_result}" >&2
            if [ "${status}" -eq 0 ]; then
              status=1
            fi
          fi
        fi
        exit "${status}"

