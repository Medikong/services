admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: auth_gateway
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: auth_gateway
                normalize_path: true
                merge_slashes: true
                route_config:
                  name: auth_routes
                  virtual_hosts:
                    - name: auth
                      domains: ["*"]
                      routes:
                        - match: { path: "/healthz" }
                          direct_response: { status: 200, body: { inline_string: "ok\n" } }
                          typed_per_filter_config:
                            envoy.filters.http.jwt_authn:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                              disabled: true
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match: { path: "/e2e/auth-readyz" }
                          route:
                            cluster: auth_admin
                            prefix_rewrite: "/readyz"
                          typed_per_filter_config:
                            envoy.filters.http.jwt_authn:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                              disabled: true
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match: { path: "/e2e/worker-readyz" }
                          route:
                            cluster: auth_worker_admin
                            prefix_rewrite: "/readyz"
                          typed_per_filter_config:
                            envoy.filters.http.jwt_authn:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                              disabled: true
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match: { prefix: "/protected" }
                          route:
                            cluster: protected_echo
                        - match: { path: "/api/v1/auth/context" }
                          route:
                            cluster: auth_service
                            timeout: 5s
                        - match: { prefix: "/api/v1/operator/auth" }
                          route:
                            cluster: auth_service
                            timeout: 10s
                        - match: { prefix: "/api/v1/auth" }
                          route:
                            cluster: auth_service
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.jwt_authn:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                              disabled: true
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match: { prefix: "/.well-known/" }
                          route:
                            cluster: auth_service
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.jwt_authn:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                              disabled: true
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(handle)
                            local remove = {}
                            for key, _ in pairs(handle:headers()) do
                              local lower = string.lower(key)
                              if string.sub(lower, 1, 7) == "x-user-" or
                                 string.sub(lower, 1, 10) == "x-session-" or
                                 string.sub(lower, 1, 8) == "x-token-" then
                                table.insert(remove, key)
                              end
                            end
                            for _, key in ipairs(remove) do
                              handle:headers():remove(key)
                            end
                          end
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        auth:
                          issuer: auth-service
                          audiences: [dropmong-api]
                          forward: true
                          remote_jwks:
                            http_uri:
                              uri: http://auth-service:8080/.well-known/jwks.json
                              cluster: auth_service
                              timeout: 1s
                            cache_duration: 300s
                      rules:
                        - match: { prefix: "/protected" }
                          requires: { provider_name: auth }
                        - match: { path: "/api/v1/auth/context" }
                          requires: { provider_name: auth }
                        - match: { prefix: "/api/v1/operator/auth" }
                          requires: { provider_name: auth }
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      failure_mode_allow: false
                      status_on_error: { code: ServiceUnavailable }
                      allowed_headers:
                        patterns:
                          - exact: authorization
                          - exact: x-request-id
                      http_service:
                        server_uri:
                          uri: http://auth-service:8080
                          cluster: auth_service
                          timeout: 0.2s
                        path_prefix: /internal/session/status
                        authorization_response:
                          allowed_upstream_headers:
                            patterns:
                              - exact: x-user-id
                              - exact: x-session-id
                              - exact: x-token-id
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(handle)
                            local path = handle:headers():get(":path") or ""
                            if string.sub(path, 1, 10) == "/protected" then
                              handle:headers():remove("authorization")
                            end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: auth_service
      type: STRICT_DNS
      connect_timeout: 0.2s
      load_assignment:
        cluster_name: auth_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: auth-service, port_value: 8080 }
    - name: auth_admin
      type: STRICT_DNS
      connect_timeout: 0.5s
      load_assignment:
        cluster_name: auth_admin
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: auth-service, port_value: 9090 }
    - name: auth_worker_admin
      type: STRICT_DNS
      connect_timeout: 0.5s
      load_assignment:
        cluster_name: auth_worker_admin
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: auth-worker, port_value: 9092 }
    - name: protected_echo
      type: STRICT_DNS
      connect_timeout: 0.5s
      load_assignment:
        cluster_name: protected_echo
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: protected-echo, port_value: 8080 }
