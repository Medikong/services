global:
  scrape_interval: 1s
  scrape_timeout: 900ms
  evaluation_interval: 1s

scrape_configs:
  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:9090"]

  - job_name: redis-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["redis-exporter:9121"]
