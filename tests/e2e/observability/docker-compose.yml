services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reference_service
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d reference_service"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  tempo:
    image: grafana/tempo:2.7.2
    # Local E2E named volumes are root-owned on first create; Tempo needs to
    # create its WAL and block directories before serving trace queries.
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"

  otel-collector:
    image: otel/opentelemetry-collector:0.123.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      tempo:
        condition: service_started
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_HEALTH_PORT:-13133}:13133"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      tempo:
        condition: service_started
    ports:
      - "${GRAFANA_PORT:-3001}:3000"

  reference-migrate:
    build:
      context: ../../..
      dockerfile: services/go-reference-service/Dockerfile
    entrypoint: ["/app/migrate"]
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/reference_service?sslmode=disable
      SERVICE_ENVIRONMENT: observability-e2e
      SERVICE_VERSION: observability-e2e
    depends_on:
      postgres:
        condition: service_healthy

  go-reference-service:
    build:
      context: ../../..
      dockerfile: services/go-reference-service/Dockerfile
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/reference_service?sslmode=disable
      REDIS_URL: redis://redis:6379
      SERVICE_ENVIRONMENT: observability-e2e
      SERVICE_VERSION: observability-e2e
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    depends_on:
      redis:
        condition: service_healthy
      reference-migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

volumes:
  tempo-data:
