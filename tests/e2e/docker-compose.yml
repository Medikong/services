x-service-e2e-env: &service-e2e-env
  SERVICE_ENVIRONMENT: e2e
  SERVICE_VERSION: e2e
  OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-none}"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
  OTEL_PYTHON_FASTAPI_EXCLUDED_URLS: "/healthz,/readyz,/metrics"

services:
  redis:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:3.8.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.created --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.approved --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.failed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.confirmed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.requested --partitions 1 --replication-factor 1

  tempo:
    image: grafana/tempo:2.7.2
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"

  otel-collector:
    image: otel/opentelemetry-collector:0.123.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      tempo:
        condition: service_started
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_HEALTH_PORT:-13133}:13133"

  loki:
    image: grafana/loki:3.7.0
    user: "0:0"
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/tmp/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"

  alloy:
    image: grafana/alloy:v1.17.0
    user: "0:0"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_started
    ports:
      - "${ALLOY_PORT:-12345}:12345"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "${GRAFANA_PORT:-3001}:3000"

  catalog-service:
    build:
      context: ../..
      dockerfile: services/catalog-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/catalog_service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${CATALOG_SERVICE_PORT:-18084}:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/order_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${ORDER_SERVICE_PORT:-18085}:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-service:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/payment_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${PAYMENT_SERVICE_PORT:-18086}:8083"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/notification_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-18087}:8084"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  log-correlation-smoke:
    build:
      context: ./log-correlation
      dockerfile: Dockerfile
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      LOKI_URL: http://loki:3100
      LOG_CORRELATION_COMPOSE_PROJECT: "${LOG_CORRELATION_COMPOSE_PROJECT:-dropmong-log-correlation}"
      LOG_CORRELATION_TIMEOUT_SECONDS: "${LOG_CORRELATION_TIMEOUT_SECONDS:-120}"
    profiles: ["smoke"]

volumes:
  alloy-data:
  loki-data:
  tempo-data:
