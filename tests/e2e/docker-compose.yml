x-service-e2e-env: &service-e2e-env
  SERVICE_ENVIRONMENT: e2e
  SERVICE_VERSION: e2e

services:
  redis:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:3.8.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.created --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.approved --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.failed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.confirmed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.requested --partitions 1 --replication-factor 1

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/auth_service?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/user_service?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT:-18081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  coupon-service:
    build:
      context: ../..
      dockerfile: services/coupon-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/coupon_service?sslmode=disable
      COUPON_REDIS_GATE_ENABLED: "${COUPON_REDIS_GATE_ENABLED:-false}"
      COUPON_REDIS_GATE_FAILURE_MODE: "${COUPON_REDIS_GATE_FAILURE_MODE:-db_fallback}"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${COUPON_SERVICE_PORT:-18082}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  backoffice-service:
    build:
      context: ../..
      dockerfile: services/backoffice-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/backoffice_service?sslmode=disable
      COUPON_SERVICE_URL: http://coupon-service:8080
    depends_on:
      postgres:
        condition: service_healthy
      coupon-service:
        condition: service_healthy
    ports:
      - "${BACKOFFICE_SERVICE_PORT:-18083}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  catalog-service:
    build:
      context: ../..
      dockerfile: services/catalog-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/catalog_service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${CATALOG_SERVICE_PORT:-18084}:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/order_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${ORDER_SERVICE_PORT:-18085}:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-service:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/payment_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${PAYMENT_SERVICE_PORT:-18086}:8083"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/notification_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-18087}:8084"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20
