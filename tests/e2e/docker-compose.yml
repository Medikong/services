x-service-e2e-env: &service-e2e-env
  SERVICE_ENVIRONMENT: e2e
  SERVICE_VERSION: e2e
  OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-none}"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
  OTEL_PYTHON_FASTAPI_EXCLUDED_URLS: "/healthz,/readyz,/metrics"

x-auth-e2e-env: &auth-e2e-env
  SERVICE_NAME: auth-service
  SERVICE_VERSION: e2e
  SERVICE_ENVIRONMENT: e2e
  DATABASE_URL: postgres://app:app@postgres:5432/auth_service?sslmode=disable
  AUTH_CREDENTIAL_HMAC_KEY: auth-e2e-credential-hmac-key-0001
  AUTH_REPLAY_ENCRYPTION_KEY: auth-e2e-replay-key-32-bytes-000
  AUTH_JWT_PRIVATE_KEY_FILE: /run/secrets/auth_e2e_jwt
  AUTH_JWT_KEY_ID: auth-e2e-rsa-1
  AUTH_JWT_ISSUER: auth-service
  AUTH_JWT_AUDIENCES: dropmong-api
  AUTH_PROOF_PRIVATE_KEY: nWGxne/9WmC6hEr0kuwsxERJxWl7MmkZcDusAxyuf2DXWpgBgrEKt9VL/tPJZAc6DuFy89qmIyWvAhpo9wdRGg
  AUTH_PROOF_KEY_ID: auth-e2e-1
  AUTH_USER_PROOF_PUBLIC_KEY: 11qYAYKxCrfVS/7TyWQHOg7hcvPapiMlrwIaaPcHURo
  AUTH_USER_PROOF_KEY_ID: user-e2e-1
  AUTH_USER_PROOF_ISSUER: user-service
  AUTH_COOKIE_SECURE: "true"
  AUTH_ALLOWED_ORIGINS: https://app.e2e.test
  AUTH_SESSION_STATUS_ENABLED: "true"
  REDIS_URL: redis://redis:6379/0
  OTEL_TRACES_EXPORTER: none

services:
  redis:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [default, auth-internal]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [default, auth-internal]

  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks: [default, auth-internal]

  kafka-init:
    image: apache/kafka:3.8.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.created --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.approved --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.failed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.confirmed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.expired --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic inventory.changed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic refund.requested --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic refund.completed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic refund.failed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.requested --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic auth.e2e.events --partitions 1 --replication-factor 1

  auth-migrate:
    profiles: [auth]
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    entrypoint: ["/app/migrate"]
    environment:
      <<: *auth-e2e-env
      MIGRATION_TIMEOUT: 2m
    depends_on:
      postgres:
        condition: service_healthy
    networks: [auth-internal]

  auth-provider:
    profiles: [auth]
    build:
      context: ../..
      dockerfile: tests/e2e/scripts/Dockerfile.auth-support
    command: ["provider"]
    environment:
      AUTH_E2E_ADMIN_TOKEN: auth-e2e-admin-control-secret-001
      AUTH_E2E_PROVIDER_TOKEN: auth-e2e-provider-secret-00000001
      AUTH_E2E_USER_PROOF_PRIVATE_KEY: nWGxne/9WmC6hEr0kuwsxERJxWl7MmkZcDusAxyuf2DXWpgBgrEKt9VL/tPJZAc6DuFy89qmIyWvAhpo9wdRGg
      AUTH_E2E_USER_PROOF_KEY_ID: user-e2e-1
    networks: [auth-edge, auth-internal]

  auth-service:
    profiles: [auth]
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: *auth-e2e-env
      HTTP_ADDR: :8080
      ADMIN_ADDR: :9090
      REDIS_DIAL_TIMEOUT: 200ms
      REDIS_READ_TIMEOUT: 200ms
      REDIS_WRITE_TIMEOUT: 200ms
      AUTH_SESSION_STATUS_DB_TIMEOUT: 100ms
    secrets: [auth_e2e_jwt]
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [auth-internal]

  auth-worker:
    profiles: [auth]
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    entrypoint: ["/app/worker"]
    environment:
      <<: *auth-e2e-env
      WORKER_ADMIN_ADDR: :9092
      AUTH_OUTBOX_BROKER_ENABLED: "true"
      AUTH_OUTBOX_BROKERS: kafka:29092
      AUTH_OUTBOX_TOPIC: auth.e2e.events
      AUTH_OUTBOX_PUBLISH_TIMEOUT: 500ms
      AUTH_DELIVERY_ENABLED: "true"
      AUTH_EMAIL_PROVIDER_URL: http://auth-provider:8080/v1/email
      AUTH_SMS_PROVIDER_URL: http://auth-provider:8080/v1/sms
      AUTH_EMAIL_PROVIDER_BEARER_TOKEN: auth-e2e-provider-secret-00000001
      AUTH_SMS_PROVIDER_BEARER_TOKEN: auth-e2e-provider-secret-00000001
      AUTH_PROVIDER_TIMEOUT: 300ms
      AUTH_DELIVERY_POLL_INTERVAL: 100ms
      AUTH_DELIVERY_LEASE: 1s
      AUTH_DELIVERY_BATCH_SIZE: 20
      AUTH_DELIVERY_MAX_ATTEMPTS: 5
      AUTH_DELIVERY_BASE_BACKOFF: 100ms
      AUTH_DELIVERY_MAX_BACKOFF: 400ms
      AUDIT_BATCH_SIZE: 50
      AUDIT_POLL_INTERVAL: 100ms
      AUDIT_LEASE: 2s
      AUDIT_PUBLISH_TIMEOUT: 500ms
      AUDIT_MAX_ATTEMPTS: 5
      AUDIT_BASE_BACKOFF: 100ms
      AUDIT_MAX_BACKOFF: 400ms
      AUDIT_OUTBOX_RETENTION: 24h
      AUDIT_CLEANUP_LIMIT: 1000
    secrets: [auth_e2e_jwt]
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      auth-provider:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [auth-internal]

  protected-echo:
    profiles: [auth]
    build:
      context: ../..
      dockerfile: tests/e2e/scripts/Dockerfile.auth-support
    command: ["echo"]
    environment:
      AUTH_E2E_ADMIN_TOKEN: auth-e2e-admin-control-secret-001
    networks: [auth-protected]

  auth-docker-socket-proxy:
    profiles: [auth]
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: "1"
      EXEC: "1"
      INFO: "1"
      PING: "1"
      POST: "1"
      ALLOW_RESTARTS: "1"
      ALLOW_START: "1"
      ALLOW_STOP: "1"
      VERSION: "1"
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [auth-internal]

  auth-control:
    profiles: [auth]
    build:
      context: ../..
      dockerfile: tests/e2e/scripts/Dockerfile.auth-support
    command: ["control"]
    environment:
      AUTH_E2E_ADMIN_TOKEN: auth-e2e-admin-control-secret-001
      AUTH_E2E_COMPOSE_PROJECT: ${AUTH_E2E_COMPOSE_PROJECT:-dropmong-e2e}
      AUTH_E2E_DOCKER_URL: http://auth-docker-socket-proxy:2375
    depends_on:
      auth-docker-socket-proxy:
        condition: service_started
    networks: [auth-edge, auth-internal, auth-protected]

  auth-edge-probe:
    profiles: [auth]
    build:
      context: ../..
      dockerfile: tests/e2e/scripts/Dockerfile.auth-support
    command: ["edge-probe"]
    environment:
      AUTH_E2E_ADMIN_TOKEN: auth-e2e-admin-control-secret-001
    networks: [auth-edge]

  auth-test-consumer:
    profiles: [auth]
    image: apache/kafka:3.8.1
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - exec /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server kafka:29092 --topic auth.e2e.events --group auth-e2e-consumer --from-beginning
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [auth-internal]

  auth-gateway:
    profiles: [auth]
    image: envoyproxy/envoy:v1.35.0
    command: ["-c", "/etc/envoy/auth.yaml", "--log-level", "warning"]
    volumes:
      - ./envoy-auth.yaml:/etc/envoy/auth.yaml:ro
    depends_on:
      auth-service:
        condition: service_started
      auth-worker:
        condition: service_started
      protected-echo:
        condition: service_started
    ports:
      - "127.0.0.1:${AUTH_GATEWAY_PORT:-18088}:8080"
    networks: [auth-edge, auth-internal, auth-protected]

  tempo:
    image: grafana/tempo:2.7.2
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "127.0.0.1:${TEMPO_PORT:-3200}:3200"

  otel-collector:
    image: otel/opentelemetry-collector:0.123.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      tempo:
        condition: service_started
    ports:
      - "127.0.0.1:${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "127.0.0.1:${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "127.0.0.1:${OTEL_COLLECTOR_HEALTH_PORT:-13133}:13133"

  loki:
    image: grafana/loki:3.7.0
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      INFO: "1"
      NETWORKS: "1"
      PING: "1"
      POST: "0"
      VERSION: "1"
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  alloy:
    image: grafana/alloy:v1.17.0
    user: "65532:65532"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/tmp/alloy
      - /etc/alloy/config.alloy
    environment:
      LOG_CORRELATION_COMPOSE_PROJECT: "${LOG_CORRELATION_COMPOSE_PROJECT:-dropmong-log-correlation}"
    volumes:
      - ./observability/alloy.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      docker-socket-proxy:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "127.0.0.1:${ALLOY_PORT:-12345}:12345"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"

  catalog-migrate:
    build:
      context: ../..
      dockerfile: services/catalog-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/catalog_service
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.migrations", "upgrade"]

  catalog-service:
    build:
      context: ../..
      dockerfile: services/catalog-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/catalog_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      catalog-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${CATALOG_SERVICE_PORT:-18084}:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-migrate:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/order_service
    command: ["python", "-m", "app.migrate", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/order_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDER_PAYMENT_TTL_SECONDS: "${ORDER_PAYMENT_TTL_SECONDS:-300}"
    depends_on:
      order-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${ORDER_SERVICE_PORT:-18085}:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-migrate:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/payment_service
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  payment-service:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/payment_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      payment-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${PAYMENT_SERVICE_PORT:-18086}:8083"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  notification-migrate:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/notification_service
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/notification_service
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      notification-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${NOTIFICATION_SERVICE_PORT:-18087}:8084"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/readyz').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  purchase-newman:
    build:
      context: .
      dockerfile: newman/Dockerfile
    profiles: ["smoke"]

  notification-replay-producer:
    image: apache/kafka:3.8.1
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        event='{"eventId":"evt-notification-metric-replay-001","eventType":"notification.requested","userId":"user-metric-replay","sourceId":"order-metric-replay-001","occurredAt":"2026-07-13T00:00:00Z","producer":"order-service","notificationId":"notification-metric-replay-001","orderId":"order-metric-replay-001","channel":"IN_APP","title":"주문이 확정되었습니다","message":"DropMong 주문이 정상 처리되었습니다."}'
        printf '%s\n%s\n' "$${event}" "$${event}" | /opt/kafka/bin/kafka-console-producer.sh --bootstrap-server kafka:29092 --topic notification.requested
    profiles: ["smoke"]

  log-correlation-smoke:
    build:
      context: ./log-correlation
      dockerfile: Dockerfile
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      LOKI_URL: http://loki:3100
      LOG_CORRELATION_COMPOSE_PROJECT: "${LOG_CORRELATION_COMPOSE_PROJECT:-dropmong-log-correlation}"
      LOG_CORRELATION_TIMEOUT_SECONDS: "${LOG_CORRELATION_TIMEOUT_SECONDS:-120}"
    profiles: ["smoke"]

  payment-failure-idempotency-smoke:
    build:
      context: ../..
      dockerfile: tests/e2e/payment-failure-idempotency-smoke/Dockerfile
      args:
        PAYMENT_FAILURE_IDEMPOTENCY_SMOKE_IMAGE: "${PAYMENT_FAILURE_IDEMPOTENCY_SMOKE_IMAGE:-python:3.12-slim}"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDER_SERVICE_URL: http://order-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      PAYMENT_FAILURE_IDEMPOTENCY_RUN_ID: "${PAYMENT_FAILURE_IDEMPOTENCY_RUN_ID:-payment-failure-idempotency}"
      PAYMENT_FAILURE_IDEMPOTENCY_TIMEOUT_SECONDS: "${PAYMENT_FAILURE_IDEMPOTENCY_TIMEOUT_SECONDS:-60}"
    profiles: ["smoke"]

volumes:
  tempo-data:

secrets:
  auth_e2e_jwt:
    file: ${AUTH_E2E_JWT_PRIVATE_KEY_FILE:-/dev/null}

networks:
  auth-edge:
  auth-internal:
    internal: true
  auth-protected:
    internal: true
