x-service-e2e-env: &service-e2e-env
  SERVICE_ENVIRONMENT: e2e
  SERVICE_VERSION: e2e

services:
  redis:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/auth_service?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/user_service?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT:-18081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  coupon-service:
    build:
      context: ../..
      dockerfile: services/coupon-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/coupon_service?sslmode=disable
      COUPON_REDIS_GATE_ENABLED: "${COUPON_REDIS_GATE_ENABLED:-false}"
      COUPON_REDIS_GATE_FAILURE_MODE: "${COUPON_REDIS_GATE_FAILURE_MODE:-db_fallback}"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${COUPON_SERVICE_PORT:-18082}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  backoffice-service:
    build:
      context: ../..
      dockerfile: services/backoffice-service/Dockerfile
    environment:
      <<: *service-e2e-env
      DATABASE_URL: postgres://app:app@postgres:5432/backoffice_service?sslmode=disable
      COUPON_SERVICE_URL: http://coupon-service:8080
    depends_on:
      postgres:
        condition: service_healthy
      coupon-service:
        condition: service_healthy
    ports:
      - "${BACKOFFICE_SERVICE_PORT:-18083}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
