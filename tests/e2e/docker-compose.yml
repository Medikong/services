services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  concert-service:
    build:
      context: ../..
      dockerfile: services/concert-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/concert_service
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  reservation-service:
    build:
      context: ../..
      dockerfile: services/reservation-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/reservation_service
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20
