# Managed service inventory.
#
# Add a service name under images when it should be built and published.
# Add a service name under tests when it should run service-scoped unit tests.
#
# Example:
# images:
#   - order-service
# tests:
#   - order-service

images:
  - auth-service
  - backoffice-service
  - catalog-service
  - coupon-service
  - notification-service
  - order-service
  - payment-service
  - user-service

tests:
  - catalog-service
  - notification-service
  - order-service
  - payment-service
