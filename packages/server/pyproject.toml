[project]
name = "server"
version = "0.1.0"
description = "Shared FastAPI server utilities for services"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.124.0",
    "prometheus-client==0.23.1",
    "sqlalchemy==2.0.45",
]

[dependency-groups]
test = [
    "httpx==0.28.1",
    "pytest==9.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
