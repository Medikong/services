openapi: 3.1.0
info:
  title: Backoffice Service API
  version: 0.1.0
  description: Prepares DropMong product, stock, sale window, and coupon policy readiness for operator scenarios.
paths:
  /admin/drops/prepare:
    post:
      tags:
        - drops
      summary: Prepare a drop and its coupon policy.
      parameters:
        - $ref: "#/components/parameters/Principal"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrepareDropRequest"
      responses:
        "200":
          description: Drop readiness after preparation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "400":
          description: Prepare request is invalid.
        "401":
          description: Principal header is missing or invalid.
        "403":
          description: Operator role is required.
  /admin/drops/{dropId}/readiness:
    get:
      tags:
        - drops
      summary: Return preparation readiness for a drop.
      parameters:
        - $ref: "#/components/parameters/Principal"
        - name: dropId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Drop readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "401":
          description: Principal header is missing or invalid.
        "403":
          description: Operator role is required.
  /healthz:
    $ref: ./operational/healthz.yaml
  /readyz:
    $ref: ./operational/readyz.yaml
  /metrics:
    $ref: ./observability/metrics.yaml
components:
  parameters:
    Principal:
      name: X-Principal
      in: header
      required: true
      schema:
        type: string
      description: Base64url encoded Principal JSON issued by auth-service.
  schemas:
    PrepareDropRequest:
      type: object
      required:
        - productId
        - productName
        - dropId
        - saleStartsAt
        - stockQuantity
        - couponPolicy
      properties:
        productId:
          type: string
        productName:
          type: string
        dropId:
          type: string
        saleStartsAt:
          type: string
          format: date-time
        stockQuantity:
          type: integer
          minimum: 1
        couponPolicy:
          $ref: "#/components/schemas/CouponPolicyInput"
    CouponPolicyInput:
      type: object
      required:
        - policyId
        - totalQuantity
      properties:
        policyId:
          type: string
        name:
          type: string
        totalQuantity:
          type: integer
          minimum: 1
    Readiness:
      type: object
      required:
        - dropId
        - ready
        - checks
      properties:
        dropId:
          type: string
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReadinessCheck"
    ReadinessCheck:
      type: object
      required:
        - ready
      properties:
        ready:
          type: boolean
        reason:
          type: string
