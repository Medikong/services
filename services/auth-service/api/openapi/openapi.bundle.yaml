openapi: 3.0.4
info:
  title: DropMong Context 인증 API
  version: 0.3.0
  description: |
    SD.A.30040의 운영 HTTP 명세 원장이다. 사용자 인증 API와 운영자 API를 포함하며
    개발 전용 가상 인증 메시지 API는 dev.openapi.yaml에서 별도로 관리한다.
servers:
  - url: https://api.dropmong.example
    description: 운영 Gateway 예시 주소
tags:
  - name: Bootstrap
    description: 로그인 전 인증 Intent와 지원 수단
  - name: Registration
    description: 회원가입 시작, 소유 확인과 동기 완료 상태
  - name: SignIn
    description: 이메일·휴대폰 로그인
  - name: PasswordReset
    description: 비밀번호 재설정 요청, 소유 확인과 비밀번호 교체
  - name: Session
    description: Session 갱신, 로그아웃과 현재 인증 컨텍스트
  - name: Reauthentication
    description: 고위험 변경을 위한 목적 한정 재인증
  - name: IdentityManagement
    description: 인증 수단 연동과 휴대폰 Identity 교체
  - name: PhoneReplacement
    description: 재인증 뒤 휴대폰 Identity를 교체하는 API
  - name: AuthenticationIntent
    description: 로그인 뒤 보존한 사용자 행동을 한 번 전달하는 API
  - name: OperatorAuth
    description: 별도 인가 경계의 결정 proof와 강한 인증이 필요한 운영자 인증 상태·수동 처리 API
  - name: AuthPolicy
    description: 단일 version snapshot으로 관리하는 운영자 인증 정책 API
paths:
  /api/v1/auth/intents:
    post:
      tags:
        - Bootstrap
      summary: AuthenticationIntent 생성
      description: |
        로그인 전에 검증된 내부 복귀 위치와 허용된 행동을 단기 Intent로 보존한다.
        웹은 Origin과 Fetch Metadata를, 모바일은 설치 ID와 활성화된 attestation 정책을
        Gateway에서 검증한다. 이 bootstrap 요청에는 아직 사전 인증 credential이 없다.
      operationId: createAuthenticationIntent
      x-api-id: API.A.300-01
      x-use-case: UC.A.300
      x-service-design: SD.A.30040
      x-design-doc: ../../API_A_300_01_create_authentication_intent.md
      x-error-codes:
        AUTH_INPUT_INVALID: 400
        AUTH_REDIRECT_INVALID: 400
        AUTH_IDEMPOTENCY_CONFLICT: 409
        AUTH_RATE_LIMITED: 429
        AUTH_SERVICE_UNAVAILABLE: 503
      security: []
      x-channel-security:
        web:
          required:
            - Origin allowlist
            - Fetch Metadata policy
        mobile:
          required:
            - verified X-Client-Channel
            - X-Device-Installation-Id
          conditional:
            - X-App-Attestation when the runtime policy is enabled
      x-idempotent-credential-reissue:
        intent: reuse the existing AuthenticationIntent
        ownerProof: rotate atomically on every same-key same-body replay
        webCsrfToken: rotate atomically with the web owner proof
        persistence: store only keyed digests; never store plaintext or encrypted replay credentials
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/XClientChannel'
        - $ref: '#/components/parameters/XDeviceInstallationId'
        - $ref: '#/components/parameters/XAppAttestation'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: Sec-Fetch-Site
          in: header
          required: false
          description: 웹 채널에서 Gateway가 Fetch Metadata 정책에 사용하는 값이다.
          schema:
            type: string
            enum:
              - same-origin
              - same-site
          example: same-origin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required:
                    - returnPath
                    - intentType
                  additionalProperties: false
                  properties:
                    returnPath:
                      type: string
                      minLength: 1
                      maxLength: 1024
                      pattern: ^/.*$
                      description: 서버 allowlist를 통과해야 하는 내부 상대 경로다.
                    intentType:
                      type: string
                      enum:
                        - navigation
                - type: object
                  required:
                    - returnPath
                    - intentType
                    - actionContext
                  additionalProperties: false
                  properties:
                    returnPath:
                      type: string
                      minLength: 1
                      maxLength: 1024
                      pattern: ^/.*$
                      description: 서버 allowlist를 통과해야 하는 내부 상대 경로다.
                    intentType:
                      type: string
                      enum:
                        - purchase
                    actionContext:
                      type: object
                      required:
                        - dropId
                        - optionId
                        - quantity
                      additionalProperties: false
                      properties:
                        dropId:
                          type: string
                          minLength: 1
                        optionId:
                          type: string
                          minLength: 1
                        quantity:
                          type: integer
                          minimum: 1
              discriminator:
                propertyName: intentType
            examples:
              navigation:
                value:
                  returnPath: /mypage/orders
                  intentType: navigation
              purchase:
                value:
                  returnPath: /drops/drop_123
                  intentType: purchase
                  actionContext:
                    dropId: drop_123
                    optionId: opt_456
                    quantity: 1
      responses:
        '201':
          description: 채널에 묶인 AuthenticationIntent와 소유 proof를 발급했다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Set-Cookie:
              description: 웹 채널에서만 사전 인증 credential을 __Host-dm_auth cookie로 전달한다.
              schema:
                type: string
              example: __Host-dm_auth=opaque-random; Path=/; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                additionalProperties: false
                properties:
                  data:
                    oneOf:
                      - type: object
                        required:
                          - authIntentId
                          - expiresAt
                          - nextPath
                          - csrfToken
                        additionalProperties: false
                        properties:
                          authIntentId:
                            $ref: '#/components/schemas/AuthenticationIntentId'
                          expiresAt:
                            type: string
                            format: date-time
                          nextPath:
                            type: string
                            pattern: ^/.*$
                          csrfToken:
                            type: string
                            minLength: 1
                            x-sensitive: true
                      - type: object
                        required:
                          - authIntentId
                          - expiresAt
                          - nextPath
                          - authFlowToken
                        additionalProperties: false
                        properties:
                          authIntentId:
                            $ref: '#/components/schemas/AuthenticationIntentId'
                          expiresAt:
                            type: string
                            format: date-time
                          nextPath:
                            type: string
                            pattern: ^/.*$
                          authFlowToken:
                            type: string
                            minLength: 1
                            x-sensitive: true
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
              examples:
                web:
                  value:
                    data:
                      authIntentId: aint_01JXYZ1234567890ABCDEFGHJK
                      expiresAt: '2026-07-10T08:10:00Z'
                      nextPath: /auth/signin
                      csrfToken: <auth-flow-csrf-token>
                    meta:
                      requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
                mobile:
                  value:
                    data:
                      authIntentId: aint_01JXYZ1234567890ABCDEFGHJK
                      expiresAt: '2026-07-10T08:10:00Z'
                      nextPath: /auth/signin
                      authFlowToken: <opaque-auth-flow-token>
                    meta:
                      requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        '400':
          $ref: '#/components/responses/AuthProblem400InputInvalidOrRedirectInvalid'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/AuthServiceUnavailable'
  /api/v1/auth/methods:
    get:
      tags:
        - Bootstrap
      summary: 인증 수단 조회
      description: 현재 Intent, client channel과 활성 정책에서 노출할 인증 수단만 반환한다.
      operationId: getAuthenticationMethods
      x-api-id: API.A.300-02
      x-use-case: UC.A.300
      x-service-design: SD.A.30040
      x-design-doc: ../../API_A_300_02_get_authentication_methods.md
      x-error-codes:
        AUTH_INTENT_NOT_FOUND: 404
        AUTH_METHOD_UNAVAILABLE: 409
        AUTH_INTENT_EXPIRED: 410
        AUTH_SERVICE_UNAVAILABLE: 503
      security:
        - WebAuthFlowCookie: []
        - MobileAuthFlowToken: []
      parameters:
        - $ref: '#/components/parameters/AuthenticationIntentIdQuery'
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/XDeviceInstallationId'
      responses:
        '200':
          description: 현재 채널과 정책에서 선택 가능한 인증 수단을 반환한다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                additionalProperties: false
                properties:
                  data:
                    type: object
                    required:
                      - intentId
                      - methods
                    additionalProperties: false
                    properties:
                      intentId:
                        $ref: '#/components/schemas/AuthenticationIntentId'
                      methods:
                        type: array
                        minItems: 1
                        uniqueItems: true
                        items:
                          type: object
                          required:
                            - type
                            - enabled
                          additionalProperties: false
                          properties:
                            type:
                              type: string
                              enum:
                                - email_password
                                - phone_otp
                            enabled:
                              type: boolean
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
              example:
                data:
                  intentId: aint_01JXYZ1234567890ABCDEFGHJK
                  methods:
                    - type: email_password
                      enabled: true
                    - type: phone_otp
                      enabled: true
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        '404':
          $ref: '#/components/responses/AuthProblem404IntentNotFound'
        '409':
          $ref: '#/components/responses/AuthProblem409MethodUnavailable'
        '410':
          $ref: '#/components/responses/Gone'
        '503':
          $ref: '#/components/responses/AuthServiceUnavailable'
  /api/v1/auth/registrations:
    post:
      tags:
        - Registration
      summary: 이메일 회원가입 시작
      description: Registration, 이메일·휴대폰 Identity 예약과 PasswordCredential을 만든다. Challenge는 별도 API에서 발급한다.
      operationId: startEmailRegistration
      x-api-id: API.A.300-03
      x-use-case: UC.A.300
      x-service-design: SD.A.30040
      x-sequences:
        - SCN.A.300-01
      x-design-doc: ../../API_A_300_03_start_email_registration.md
      x-parent-lifetime-extension: Registration, AuthenticationIntent, and its active owner proof share the child expiry capped by the maximum auth-flow lifetime.
      x-registration-status-proof:
        credential: registrationStatusToken
        storage: keyed hash and independent expiry only
        authority: read registration status only
        lifetime: valid through the short terminal status-retention period
        replay: rotate the token and hash atomically for the same idempotency key and body
      x-error-codes:
        AUTH_INPUT_INVALID: 400
        AUTH_CSRF_INVALID: 403
        AUTH_INTENT_NOT_FOUND: 404
        AUTH_IDENTIFIER_UNAVAILABLE: 409
        AUTH_IDEMPOTENCY_CONFLICT: 409
        AUTH_INTENT_EXPIRED: 410
        AUTH_RATE_LIMITED: 429
        AUTH_SERVICE_UNAVAILABLE: 503
      security:
        - WebAuthFlowCookie: []
          WebCsrfToken: []
          WebOrigin: []
        - MobileAuthFlowToken: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/XDeviceInstallationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - authIntentId
                - email
                - password
                - phone
                - rememberMe
              additionalProperties: false
              properties:
                authIntentId:
                  $ref: '#/components/schemas/AuthenticationIntentId'
                email:
                  type: string
                  format: email
                  minLength: 3
                  maxLength: 254
                password:
                  type: string
                  format: password
                  minLength: 1
                  maxLength: 1024
                  writeOnly: true
                  x-sensitive: true
                  description: 세부 강도는 현재 PasswordPolicy로 검증한다.
                phone:
                  $ref: '#/components/schemas/PhoneNumber'
                rememberMe:
                  type: boolean
            example:
              authIntentId: aint_01JXYZ1234567890ABCDEFGHJK
              email: buyer@example.com
              password: <user-entered-password>
              phone:
                countryCode: '+82'
                nationalNumber: '01012345678'
              rememberMe: true
      responses:
        '201':
          description: 이메일·휴대폰 소유 확인을 기다리는 Registration을 만들었다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                additionalProperties: false
                properties:
                  data:
                    type: object
                    required:
                      - registrationId
                      - status
                      - requiredVerifications
                      - verifiedMethods
                      - expiresAt
                      - registrationStatusToken
                      - registrationStatusTokenExpiresAt
                    additionalProperties: false
                    properties:
                      registrationId:
                        $ref: '#/components/schemas/RegistrationId'
                      status:
                        type: string
                        enum:
                          - pending_verification
                      requiredVerifications:
                        type: array
                        minItems: 2
                        maxItems: 2
                        uniqueItems: true
                        items:
                          type: string
                          enum:
                            - email
                            - phone
                      verifiedMethods:
                        type: array
                        maxItems: 0
                        items:
                          type: string
                          enum:
                            - email
                            - phone
                      expiresAt:
                        type: string
                        format: date-time
                      registrationStatusToken:
                        type: string
                        minLength: 32
                        x-sensitive: true
                        description: API 28 회원가입 상태 조회에만 사용할 수 있는 opaque proof다.
                      registrationStatusTokenExpiresAt:
                        type: string
                        format: date-time
                        description: terminal 상태의 짧은 조회 보존 기간을 포함한 상태 조회 proof 만료 시각이다.
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
              example:
                data:
                  registrationId: reg_01JXYZ1234567890ABCDEFGHJK
                  status: pending_verification
                  requiredVerifications:
                    - email
                    - phone
                  verifiedMethods: []
                  expiresAt: '2026-07-10T08:30:00Z'
                  registrationStatusToken: <opaque-registration-status-token>
                  registrationStatusTokenExpiresAt: '2026-07-10T09:00:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        '400':
          $ref: '#/components/responses/InputInvalid'
        '403':
          $ref: '#/components/responses/AuthProblem403CsrfInvalid'
        '404':
          $ref: '#/components/responses/AuthProblem404IntentNotFound'
        '409':
          $ref: '#/components/responses/AuthProblem409IdempotencyConflictOrIdentifierUnavailable'
        '410':
          $ref: '#/components/responses/Gone'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/AuthServiceUnavailable'
  /api/v1/auth/registrations/{registrationId}/challenges:
    post:
      tags:
        - Registration
      summary: 가입 Challenge 발급
      description: 가입에 필요한 이메일 또는 휴대폰 code Challenge와 비동기 delivery outbox를 만든다.
      operationId: issueRegistrationChallenge
      x-api-id: API.A.300-04
      x-use-case: UC.A.300
      x-service-design: SD.A.30040
      x-sequences:
        - SCN.A.300-01
      x-design-doc: ../../API_A_300_04_issue_registration_challenge.md
      x-error-codes:
        AUTH_INPUT_INVALID: 400
        AUTH_CSRF_INVALID: 403
        AUTH_REGISTRATION_NOT_FOUND: 404
        AUTH_METHOD_UNAVAILABLE: 409
        AUTH_IDEMPOTENCY_CONFLICT: 409
        AUTH_REGISTRATION_EXPIRED: 410
        AUTH_RATE_LIMITED: 429
        AUTH_SERVICE_UNAVAILABLE: 503
      security:
        - WebAuthFlowCookie: []
          WebCsrfToken: []
          WebOrigin: []
        - MobileAuthFlowToken: []
      parameters:
        - $ref: '#/components/parameters/RegistrationId'
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/XDeviceInstallationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
              additionalProperties: false
              properties:
                method:
                  type: string
                  enum:
                    - email
                    - phone
            example:
              method: email
      responses:
        '201':
          description: Challenge와 delivery 요청을 만들었다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                additionalProperties: false
                properties:
                  data:
                    type: object
                    required:
                      - challengeId
                      - method
                      - maskedDestination
                      - expiresAt
                      - resendAvailableAt
                    additionalProperties: false
                    properties:
                      challengeId:
                        $ref: '#/components/schemas/ChallengeId'
                      method:
                        type: string
                        enum:
                          - email
                          - phone
                      maskedDestination:
                        type: string
                        minLength: 1
                      expiresAt:
                        type: string
                        format: date-time
                      resendAvailableAt:
                        type: string
                        format: date-time
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
              example:
                data:
                  challengeId: vch_01JXYZ1234567890ABCDEFGHJK
                  method: email
                  maskedDestination: b***@example.com
                  expiresAt: '2026-07-10T08:08:00Z'
                  resendAvailableAt: '2026-07-10T08:01:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        '400':
          $ref: '#/components/responses/InputInvalid'
        '403':
          $ref: '#/components/responses/AuthProblem403CsrfInvalid'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/AuthProblem409IdempotencyConflictOrMethodUnavailable'
        '410':
          $ref: '#/components/responses/AuthProblem410RegistrationExpired'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/AuthServiceUnavailable'
  /api/v1/auth/registrations/{registrationId}/challenges/{challengeId}/verify:
    post:
      tags:
        - Registration
      summary: 가입 Challenge 검증
      description: 가입용 이메일 또는 휴대폰 6자리 code를 검증하고 Challenge와 Identity 상태를 원자적으로 갱신한다.
      operationId: verifyRegistrationChallenge
      x-api-id: API.A.300-05
      x-use-case: UC.A.300
      x-service-design: SD.A.30040
      x-sequences:
        - SCN.A.300-01
      x-design-doc: ../../API_A_300_05_verify_registration_challenge.md
      x-error-codes:
        AUTH_INPUT_INVALID: 400
        AUTH_CHALLENGE_FAILED: 400
        AUTH_CSRF_INVALID: 403
        AUTH_REGISTRATION_NOT_FOUND: 404
        AUTH_IDEMPOTENCY_CONFLICT: 409
        AUTH_CHALLENGE_EXPIRED: 410
        AUTH_RATE_LIMITED: 429
        AUTH_SERVICE_UNAVAILABLE: 503
      security:
        - WebAuthFlowCookie: []
          WebCsrfToken: []
          WebOrigin: []
        - MobileAuthFlowToken: []
      parameters:
        - $ref: '#/components/parameters/RegistrationId'
        - $ref: '#/components/parameters/ChallengeId'
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/XDeviceInstallationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              additionalProperties: false
              properties:
                code:
                  $ref: '#/components/schemas/VerificationCode'
            example:
              code: '123456'
      responses:
        '200':
          description: Challenge를 검증하고 Registration의 확인 수단 상태를 갱신했다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                additionalProperties: false
                properties:
                  data:
                    type: object
                    required:
                      - challengeId
                      - status
                      - registration
                    additionalProperties: false
                    properties:
                      challengeId:
                        $ref: '#/components/schemas/ChallengeId'
                      status:
                        type: string
                        enum:
                          - verified
                      registration:
                        type: object
                        required:
                          - status
                          - verifiedMethods
                          - requiredVerifications
                        additionalProperties: false
                        properties:
                          status:
                            type: string
                            enum:
                              - pending_verification
                              - verified
                          verifiedMethods:
                            type: array
                            minItems: 1
                            maxItems: 2
                            uniqueItems: true
                            items:
                              type: string
                              enum:
                                - email
                                - phone
                          requiredVerifications:
                            type: array
                            minItems: 2
                            maxItems: 2
                            uniqueItems: true
                            items:
                              type: string
                              enum:
                                - email
                                - phone
                          registrationCompletionProof:
                            type: string
                            minLength: 1
                            x-sensitive: true
                            description: 두 필수 수단이 모두 verified일 때만 반환하는 짧은 수명의 서명 proof다.
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
              example:
                data:
                  challengeId: vch_01JXYZ1234567890ABCDEFGHJK
                  status: verified
                  registration:
                    status: pending_verification
                    verifiedMethods:
                      - email
                    requiredVerifications:
                      - email
                      - phone
                meta:
