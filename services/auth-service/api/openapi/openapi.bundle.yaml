components:
  securitySchemes:
    WebAuthFlowCookie:
      type: apiKey
      in: cookie
      name: __Host-dm_auth
      description: 웹의 사전 인증 컨텍스트와 Registration 소유권을 증명하는 단기 HttpOnly cookie다.
    WebCsrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: WebAuthFlowCookie 또는 WebRefreshCookie와 함께 제출하는 CSRF token이다. operation의 security requirement가 지정한 cookie와의 binding을 검증한다.
    WebOrigin:
      type: apiKey
      in: header
      name: Origin
      description: 웹 요청에서 필수인 Origin 헤더다. 인증 credential이 아니며 Gateway가 allowlist와 정확히 비교한다. OpenAPI의 조건부 header 한계를 보완하기 위해 security scheme으로 표현한다.
      x-purpose: origin-allowlist
    WebRefreshCookie:
      type: apiKey
      in: cookie
      name: __Host-dm_refresh
      description: 웹 refresh family를 가리키는 회전형 HttpOnly cookie다. 보호 API의 credential로 사용할 수 없다.
    MobileAuthFlowToken:
      type: apiKey
      in: header
      name: X-Auth-Flow-Token
      description: 모바일 사전 인증 단계에서 Registration 또는 Challenge 소유권을 증명하는 단기 opaque token이다.
    RegistrationStatusToken:
      type: apiKey
      in: header
      name: X-Registration-Status-Token
      description: 회원가입 시작 때 발급하고 Registration에만 묶는 읽기 전용 단기 opaque token이다. 완료·실패·만료 뒤 짧은 상태 조회 보존 기간까지 사용할 수 있으며 가입 완료나 Session 발급 권한은 주지 않는다.
      x-sensitive: true
    MobileRefreshToken:
      type: apiKey
      in: header
      name: X-Refresh-Token
      description: 모바일 refresh와 로그아웃에 제출하는 회전형 opaque credential이다. URL, query 또는 로그에 넣지 않는다.
      x-sensitive: true
    AccessBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 웹과 모바일 보호 API에 공통으로 제출하는 짧은 수명 access JWT다.
    OperatorAuthorizationDecision:
      type: apiKey
      in: header
      name: X-Authorization-Decision
      description: 별도 인가 경계가 action, subject, resource, 만료와 일회성을 서명해 발급한 결정 proof다. auth-service는 role이나 permission을 직접 조회하지 않는다.
      x-sensitive: true
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: 클라이언트가 선택적으로 보내는 요청 식별자다. 비어 있거나 유효하지 않으면 Gateway가 새 UUID를 발급한다.
      schema:
        type: string
      example: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context의 traceparent 값이다.
      schema:
        type: string
      example: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    XClientChannel:
      name: X-Client-Channel
      in: header
      required: true
      description: Gateway가 검증하는 클라이언트 채널이다. 응답 credential 종류는 이 값만으로 결정하지 않는다.
      schema:
        type: string
        enum:
          - web
          - ios
          - android
      example: web
    XDeviceInstallationId:
      name: X-Device-Installation-Id
      in: header
      required: false
      description: 모바일 요청에서 사용하는 앱 설치 단위의 opaque 난수 식별자다.
      schema:
        type: string
      example: inst_01JXYZ1234567890ABCDEFGHJK
    XAppAttestation:
      name: X-App-Attestation
      in: header
      required: false
      description: 모바일 bootstrap 정책이 활성화된 경우 Gateway가 검증하는 Apple 또는 Google app attestation 원문이다. Auth 서비스에는 전달하지 않는다.
      schema:
        type: string
        minLength: 1
      x-sensitive: true
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: 같은 API와 actor 또는 사전 인증 컨텍스트 안에서 하나의 논리 실행을 식별하는 UUID다.
      schema:
        type: string
        format: uuid
      example: 04bbeb3a-5576-4e95-acb1-89f74ef9eae2
    AuthenticationIntentIdQuery:
      name: intentId
      in: query
      required: true
      description: 현재 사전 인증 credential에 바인딩된 AuthenticationIntent 식별자다.
      schema:
        $ref: '#/components/schemas/AuthenticationIntentId'
    RegistrationId:
      name: registrationId
      in: path
      required: true
      description: 회원가입 처리의 opaque 식별자다. 구체적인 길이와 문자 집합은 아직 확정하지 않았다.
      schema:
        $ref: '#/components/schemas/RegistrationId'
      example: reg_01JXYZ1234567890ABCDEFGHJK
    ChallengeId:
      name: challengeId
      in: path
      required: true
      description: 인증 Challenge의 opaque 식별자다. UUID 또는 prefix 식별자 여부는 아직 확정하지 않았다.
      schema:
        $ref: '#/components/schemas/ChallengeId'
      example: vch_01JXYZ1234567890ABCDEFGHJK
    PasswordResetId:
      name: passwordResetId
      in: path
      required: true
      description: 현재 사전 인증 credential에 바인딩된 비밀번호 재설정 식별자다.
      schema:
        $ref: '#/components/schemas/PasswordResetId'
    LinkIntentId:
      name: linkIntentId
      in: path
      required: true
      description: 현재 사용자 Session에 바인딩된 requested IdentityLink 식별자다.
      schema:
        $ref: '#/components/schemas/LinkIntentId'
    ReplacementId:
      name: replacementId
      in: path
      required: true
      description: 현재 사용자 Session에 바인딩된 휴대폰 교체 IdentityLink 식별자다.
      schema:
        $ref: '#/components/schemas/ReplacementId'
    UserId:
      name: userId
      in: path
      required: true
      description: 운영자가 인증 상태를 조회할 Context 사용자 식별자다.
      schema:
        $ref: '#/components/schemas/UserId'
    XAuditReasonCode:
      name: X-Audit-Reason-Code
      in: header
      required: true
      description: 운영자 조회 목적을 나타내는 PII 없는 안정적인 사유 코드다.
      schema:
        type: string
        minLength: 1
        maxLength: 64
        pattern: ^[A-Z][A-Z0-9_]+$
      example: CUSTOMER_SUPPORT_CASE
    PolicyName:
      name: policyName
      in: path
      required: true
      description: 새 전체 정책 snapshot에서 변경할 정책 영역 이름이다.
      schema:
        $ref: '#/components/schemas/PolicyName'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 현재 활성 정책 snapshot의 strong ETag다. 값이 다르면 변경하지 않는다.
      schema:
        type: string
        pattern: ^"policy-[0-9]+"$
      example: '"policy-7"'
    AuthenticationIntentIdPath:
      name: intentId
      in: path
      required: true
      description: 인증 후 행동을 전달할 AuthenticationIntent 식별자다.
      schema:
        $ref: '#/components/schemas/AuthenticationIntentId'
  headers:
    XRequestId:
      description: Gateway가 확정해 응답 본문 meta.requestId와 동일하게 반환하는 요청 식별자다.
      schema:
        type: string
        format: uuid
      example: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    CacheControlNoStore:
      description: 응답을 브라우저, CDN 또는 중간 캐시에 저장하지 못하게 한다.
      schema:
        type: string
        enum:
          - no-store
      example: no-store
    RetryAfter:
      description: 클라이언트가 다음 요청을 보내기 전에 기다려야 하는 최소 초다.
      schema:
        type: integer
        minimum: 1
      example: 1
    SetRefreshAndClearAuthCookies:
      description: |
        로그인 또는 회원가입 완료 응답에서 두 개의 Set-Cookie 필드를 보낸다. 첫 필드는
        `__Host-dm_refresh`를 새로 발급하며 서버 refresh expiry를 넘지 않는 Max-Age를
        포함한다. 둘째 필드는 `__Host-dm_auth`를 Max-Age=0으로 폐기한다.
        클라이언트와 중간 계층은 반복된 Set-Cookie 필드를 쉼표로 합치지 않는다.
      schema:
        type: string
      x-multiple: true
      example: __Host-dm_refresh=opaque-random; Path=/api/v1/auth/sessions; HttpOnly; Secure; SameSite=Strict
      x-required-set-cookie-fields:
        - __Host-dm_refresh
        - __Host-dm_auth
    ClearAuthFlowCookie:
      description: 웹 사전 인증 cookie를 즉시 폐기하는 Set-Cookie 필드다.
      schema:
        type: string
      x-multiple: true
      example: __Host-dm_auth=; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=0
    SetRefreshCookie:
      description: |
        웹 refresh family의 opaque credential을 새로 전달하거나 회전한다.
        JavaScript에서 읽을 수 없으며 서버의 refresh expiry를 넘지 않는 Max-Age를 사용한다.
      schema:
        type: string
      x-multiple: true
      example: __Host-dm_refresh=opaque-random; Path=/api/v1/auth/sessions; HttpOnly; Secure; SameSite=Strict
    ClearRefreshCookie:
      description: 웹 refresh cookie를 즉시 폐기하는 Set-Cookie 필드다.
      schema:
        type: string
      x-multiple: true
      example: __Host-dm_refresh=; Path=/api/v1/auth/sessions; HttpOnly; Secure; SameSite=Strict; Max-Age=0
    VaryAuthorization:
      description: 인증 응답을 공유 캐시가 Authorization header별로 구분하도록 하는 값이다.
      schema:
        type: string
        enum:
          - Authorization
      example: Authorization
    ETag:
      description: 새로 활성화한 전체 인증 정책 snapshot의 strong ETag다.
      schema:
        type: string
        pattern: ^"policy-[0-9]+"$
      example: '"policy-8"'
  schemas:
    AuthenticationIntentId:
      type: string
      minLength: 1
      maxLength: 128
      description: 로그인 전 행동과 복귀 위치를 보존하는 opaque Intent 식별자다.
      example: aint_01JXYZ1234567890ABCDEFGHJK
    ResponseMeta:
      type: object
      required:
        - requestId
      additionalProperties: false
      properties:
        requestId:
          type: string
          format: uuid
          description: 응답 헤더 X-Request-Id와 같은 요청 식별자다.
          example: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    ErrorResponse:
      type: object
      required:
        - code
        - status
        - message
        - requestId
      additionalProperties: false
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 100
          pattern: ^[A-Za-z][A-Za-z0-9._-]+$
          description: 서비스별 namespace를 사용할 수 있는 안정적인 공개 오류 코드다.
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP 응답 상태와 같은 값이다.
        message:
          type: string
          minLength: 1
          maxLength: 500
          description: 개인정보, credential과 내부 오류 원인을 포함하지 않는 공개 메시지다.
        requestId:
          type: string
          minLength: 1
          maxLength: 128
          description: 지원 및 추적에 사용하는 요청 식별자다.
    PhoneNumber:
      type: object
      required:
        - countryCode
        - nationalNumber
      additionalProperties: false
      properties:
        countryCode:
          type: string
          pattern: ^\+[1-9][0-9]{0,2}$
          example: '+82'
        nationalNumber:
          type: string
          pattern: ^[0-9]{4,14}$
          description: 서버가 E.164로 정규화하기 전 국가번호 제외 숫자 문자열이다.
          example: '01012345678'
    RegistrationId:
      type: string
      minLength: 1
      description: 회원가입 처리의 opaque 식별자다. 구체적인 길이와 문자 집합은 아직 확정하지 않았다.
      example: reg_01JXYZ1234567890ABCDEFGHJK
    ChallengeId:
      type: string
      minLength: 1
      description: 인증 Challenge의 opaque 식별자다. UUID 또는 prefix 식별자 여부는 아직 확정하지 않았다.
      example: vch_01JXYZ1234567890ABCDEFGHJK
    VerificationCode:
      type: string
      pattern: ^[0-9]{6}$
      minLength: 6
      maxLength: 6
      description: MVP 이메일·SMS 소유 확인에 공통으로 사용하는 6자리 숫자 인증번호다.
      x-sensitive: true
      example: '123456'
    SessionSummary:
      type: object
      required:
        - sessionId
        - expiresAt
      additionalProperties: false
      properties:
        sessionId:
          type: string
          description: 서버 Session의 opaque 식별자다.
          example: ses_01JXYZ1234567890ABCDEFGHJK
        expiresAt:
          type: string
          format: date-time
          description: Session의 절대 만료 시각이다.
          example: '2026-07-24T08:00:00Z'
    WebAccessToken:
      type: object
      required:
        - accessToken
        - accessTokenExpiresAt
      additionalProperties: false
      properties:
        accessToken:
          type: string
          description: 웹앱 메모리에만 보관하는 짧은 수명의 DropMong access JWT다.
          x-sensitive: true
          example: <signed-jwt>
        accessTokenExpiresAt:
          type: string
          format: date-time
          example: '2026-07-10T08:15:00Z'
    NextAction:
      type: object
      description: AuthenticationIntent가 없으면 intentId를 생략하고 path에는 서버 정책의 안전한 기본 경로를 반환한다.
      required:
        - path
      additionalProperties: false
      properties:
        path:
          type: string
          pattern: ^/($|[^/\\][^\\]*)$
          description: 서버가 검증한 앱 내부 상대 경로다.
          example: /drops/drop_01JXYZ1234567890ABCDEFGHJK
        intentId:
          $ref: '#/components/schemas/AuthenticationIntentId'
    WebRegistrationCompletedData:
      type: object
      required:
        - registrationId
        - status
        - credentialDelivery
        - userId
        - session
        - access
        - next
      additionalProperties: false
      properties:
        registrationId:
          $ref: '#/components/schemas/RegistrationId'
        status:
          type: string
          enum:
            - completed
        credentialDelivery:
          type: string
          enum:
            - web_jwt_refresh_cookie
          description: access JWT는 본문으로, opaque refresh token은 HttpOnly cookie로 전달했음을 나타낸다.
        userId:
          type: string
          description: Context 사용자가 발급하고 Auth에 연결한 사용자 식별자다.
          example: usr_01JXYZ1234567890ABCDEFGHJK
        session:
          $ref: '#/components/schemas/SessionSummary'
        access:
          $ref: '#/components/schemas/WebAccessToken'
        next:
          $ref: '#/components/schemas/NextAction'
    MobileTokenPair:
      type: object
      required:
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
      additionalProperties: false
      properties:
        accessToken:
          type: string
          description: 짧은 수명의 DropMong access JWT다.
          x-sensitive: true
          example: <signed-jwt>
        accessTokenExpiresAt:
          type: string
          format: date-time
          example: '2026-07-10T08:15:00Z'
        refreshToken:
          type: string
          description: 서버 상태를 가진 회전형 opaque refresh token이다.
          x-sensitive: true
          example: <opaque-refresh-token>
        refreshTokenExpiresAt:
          type: string
          format: date-time
          example: '2026-07-24T08:00:00Z'
    MobileRegistrationCompletedData:
      type: object
      required:
        - registrationId
        - status
        - credentialDelivery
        - userId
        - session
        - tokens
        - next
      additionalProperties: false
      properties:
        registrationId:
          $ref: '#/components/schemas/RegistrationId'
        status:
          type: string
          enum:
            - completed
        credentialDelivery:
          type: string
          enum:
            - mobile_tokens
          description: access JWT와 모바일 opaque refresh token으로 credential을 전달했음을 나타낸다.
        userId:
          type: string
          description: Context 사용자가 발급하고 Auth에 연결한 사용자 식별자다.
          example: usr_01JXYZ1234567890ABCDEFGHJK
        session:
          $ref: '#/components/schemas/SessionSummary'
        tokens:
          $ref: '#/components/schemas/MobileTokenPair'
        next:
          $ref: '#/components/schemas/NextAction'
    RegistrationCompletedResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          oneOf:
            - $ref: '#/components/schemas/WebRegistrationCompletedData'
            - $ref: '#/components/schemas/MobileRegistrationCompletedData'
          discriminator:
            propertyName: credentialDelivery
            mapping:
              web_jwt_refresh_cookie: '#/components/schemas/WebRegistrationCompletedData'
              mobile_tokens: '#/components/schemas/MobileRegistrationCompletedData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    UserId:
      type: string
      minLength: 1
      maxLength: 128
      description: Context 사용자가 발급한 내부 공유 사용자 식별자다.
      example: usr_01JXYZ1234567890ABCDEFGHJK
    WebAuthenticationCompletedData:
      type: object
      required:
        - credentialDelivery
        - userId
        - session
        - access
        - next
      additionalProperties: false
      properties:
        credentialDelivery:
          type: string
          enum:
            - web_jwt_refresh_cookie
        userId:
          $ref: '#/components/schemas/UserId'
        session:
          $ref: '#/components/schemas/SessionSummary'
        access:
          $ref: '#/components/schemas/WebAccessToken'
        next:
          $ref: '#/components/schemas/NextAction'
    MobileAuthenticationCompletedData:
      type: object
      required:
        - credentialDelivery
        - userId
        - session
        - tokens
        - next
      additionalProperties: false
      properties:
        credentialDelivery:
          type: string
          enum:
            - mobile_tokens
        userId:
          $ref: '#/components/schemas/UserId'
        session:
          $ref: '#/components/schemas/SessionSummary'
        tokens:
          $ref: '#/components/schemas/MobileTokenPair'
        next:
          $ref: '#/components/schemas/NextAction'
    AuthenticationCompletedResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          oneOf:
            - $ref: '#/components/schemas/WebAuthenticationCompletedData'
            - $ref: '#/components/schemas/MobileAuthenticationCompletedData'
          discriminator:
            propertyName: credentialDelivery
            mapping:
              web_jwt_refresh_cookie: '#/components/schemas/WebAuthenticationCompletedData'
              mobile_tokens: '#/components/schemas/MobileAuthenticationCompletedData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PasswordResetId:
      type: string
      minLength: 1
      maxLength: 128
      description: 실제 계정 여부를 노출하지 않는 opaque 비밀번호 재설정 식별자다.
      example: prst_01JXYZ1234567890ABCDEFGHJK
    SessionId:
      type: string
      minLength: 1
      maxLength: 128
      description: 서버 Session의 opaque 식별자다.
      example: ses_01JXYZ1234567890ABCDEFGHJK
    LinkIntentId:
      type: string
      minLength: 1
      maxLength: 128
      description: 새 인증 수단 연결을 위해 requested 상태로 만든 IdentityLink 식별자다.
      example: ilnk_01JXYZ1234567890ABCDEFGHJK
    CodeProof:
      type: object
      required:
        - type
        - value
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - code
        value:
          $ref: '#/components/schemas/VerificationCode'
    ReplacementId:
      type: string
      minLength: 1
      maxLength: 128
      description: 휴대폰 Identity 교체를 위해 requested 상태로 만든 IdentityLink 식별자다.
      example: ilnk_01JXYZ1234567890ABCDEFGHJK
    EmptyRequest:
      type: object
      description: 별도 업무 입력값이 없는 명령에서 사용하는 정확히 빈 JSON 객체다.
      maxProperties: 0
      additionalProperties: false
      example: {}
    PolicyName:
      type: string
      enum:
        - login-lock
        - session-ttl
        - refresh-rotation
        - verification
        - session-revocation
      description: 변경 가능한 인증 정책 영역 이름이다.
  responses:
    AuthProblem400InputInvalidOrRedirectInvalid:
      description: 이 operation에서 HTTP 400로 반환할 수 있는 인증 도메인 오류다.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 400
                  code:
                    type: string
                    enum:
                      - AUTH_INPUT_INVALID
                      - AUTH_REDIRECT_INVALID
          examples:
            inputInvalid:
              summary: AUTH_INPUT_INVALID
              value:
                status: 400
                code: AUTH_INPUT_INVALID
                message: 요청 조건과 현재 인증 상태를 확인해주세요.
                requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
            redirectInvalid:
              summary: AUTH_REDIRECT_INVALID
              value:
                status: 400
                code: AUTH_REDIRECT_INVALID
                message: 요청 조건과 현재 인증 상태를 확인해주세요.
                requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    Conflict:
      description: 현재 상태, 동시 변경 또는 멱등 요청이 새 실행과 충돌한다.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
