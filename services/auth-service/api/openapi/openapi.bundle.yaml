              $ref: '#/components/headers/CacheControlNoStore'
            Set-Cookie:
              $ref: '#/components/headers/ClearAuthFlowCookie'
        '400':
          $ref: '#/components/responses/AuthProblem400InputInvalidOrPasswordResetInvalid'
        '403':
          $ref: '#/components/responses/AuthProblem403CsrfInvalid'
        '409':
          $ref: '#/components/responses/Conflict'
        '410':
          $ref: '#/components/responses/AuthProblem410PasswordResetGrantExpired'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '503':
          $ref: '#/components/responses/AuthServiceUnavailable'
