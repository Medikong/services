openapi: 3.1.0
info:
  title: Coupon Service API
  version: 0.1.0
  description: Owns first-come coupon policies, issuance transactions, idempotency, and user coupon state.
paths:
  /v1/internal/coupon-policies:
    post:
      tags:
        - coupon-policies
      summary: Create or update a coupon policy prepared by backoffice-service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreparePolicyRequest"
      responses:
        "200":
          description: Coupon policy is ready or updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Coupon policy request is invalid.
  /v1/internal/coupon-policies/{policyId}:
    get:
      tags:
        - coupon-policies
      summary: Return coupon policy state.
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Coupon policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "422":
          description: Coupon policy is not found.
  /v1/coupons/issue:
    post:
      tags:
        - coupons
      summary: Issue a first-come coupon for the authenticated user.
      parameters:
        - $ref: "#/components/parameters/Principal"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCouponRequest"
      responses:
        "200":
          description: Coupon issue result. Duplicate requests return the existing coupon.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResult"
        "401":
          description: Principal header is missing or invalid.
        "409":
          description: Coupon inventory is sold out.
        "422":
          description: Coupon policy is missing or not ready.
  /v1/coupons/me:
    get:
      tags:
        - coupons
      summary: List coupons issued to the authenticated user.
      parameters:
        - $ref: "#/components/parameters/Principal"
      responses:
        "200":
          description: User coupons.
          content:
            application/json:
              schema:
                type: object
                required:
                  - coupons
                properties:
                  coupons:
                    type: array
                    items:
                      $ref: "#/components/schemas/Coupon"
        "401":
          description: Principal header is missing or invalid.
  /healthz:
    $ref: ./operational/healthz.yaml
  /readyz:
    $ref: ./operational/readyz.yaml
  /metrics:
    $ref: ./observability/metrics.yaml
components:
  parameters:
    Principal:
      name: X-Principal
      in: header
      required: true
      schema:
        type: string
      description: Base64url encoded Principal JSON issued by auth-service.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Optional stable key for retrying coupon issue requests.
  schemas:
    PreparePolicyRequest:
      type: object
      required:
        - policyId
        - dropId
        - totalQuantity
      properties:
        policyId:
          type: string
        dropId:
          type: string
        name:
          type: string
        totalQuantity:
          type: integer
          minimum: 1
        status:
          type: string
          default: ready
    IssueCouponRequest:
      type: object
      required:
        - policyId
      properties:
        policyId:
          type: string
    Policy:
      type: object
      required:
        - policyId
        - dropId
        - name
        - totalQuantity
        - issuedCount
        - status
      properties:
        policyId:
          type: string
        dropId:
          type: string
        name:
          type: string
        totalQuantity:
          type: integer
        issuedCount:
          type: integer
        status:
          type: string
    Coupon:
      type: object
      required:
        - couponId
        - policyId
        - dropId
        - userId
        - status
      properties:
        couponId:
          type: string
        policyId:
          type: string
        dropId:
          type: string
        userId:
          type: string
        status:
          type: string
    IssueResult:
      type: object
      required:
        - result
        - coupon
      properties:
        result:
          type: string
          enum:
            - issued
            - duplicate
        coupon:
          $ref: "#/components/schemas/Coupon"
