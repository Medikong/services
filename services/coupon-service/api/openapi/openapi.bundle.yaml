openapi: 3.0.4
info:
  title: Context 쿠폰 API
  version: 0.1.0
  description: Context 쿠폰의 공개 구매자 API와 내부 주문·운영·CS·정산 API 계약이다.
  license:
    name: Proprietary
servers:
  - url: https://api.dropmong.example
    description: 공개 Gateway 예시 주소
tags:
  - name: CouponWallet
    description: 구매자 쿠폰 수령·코드 등록·쿠폰함 API
  - name: CouponRedemption
    description: 주문·결제 workload의 쿠폰 검증·예약·확정·해제·회수 API
  - name: CouponCampaign
    description: 캠페인 정책·승인·성과 API
  - name: CouponOperations
    description: 대량 발급·운영 중지·복구·CS·정산 API
paths:
  /api/v1/coupon-campaigns/{campaignId}/claims:
    post:
      tags:
        - CouponWallet
      summary: 쿠폰 수령 접수
      description: 구매자의 직접 수령 요청을 접수하고 발급 대기 상태와 조회 위치를 반환한다. 실제 발급 완료는 UserCoupon 생성과 수량 확정 뒤 별도 조회에서 확인한다.
      operationId: claimCoupon
      x-api-id: API.A.19-01
      x-use-case: UC.A.19-04
      x-command: CMD.A.19-05
      x-service-design: SD.A.1940
      x-design-doc: ../../API_A_19_01_claim_coupon.md
      x-error-codes:
        COUPON_INPUT_INVALID: 400
        COUPON_AUTHENTICATION_REQUIRED: 401
        COUPON_FORBIDDEN: 403
        COUPON_IDEMPOTENCY_CONFLICT: 409
        COUPON_OPERATION_STOPPED: 409
        COUPON_BUSINESS_RULE_REJECTED: 422
        COUPON_RATE_LIMITED: 429
        COUPON_DEPENDENCY_UNAVAILABLE: 503
      security:
        - WebSessionCookie: []
          WebCsrfToken: []
          WebOrigin: []
        - MobileBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CampaignId'
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 발급 요청을 접수해 발급 대기 상태로 전환했다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Location:
              $ref: '#/components/headers/Location'
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/BusinessRejected'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/Unavailable'
  /api/v1/coupon-code-redemptions:
    post:
      tags:
        - CouponWallet
      summary: 쿠폰 코드 등록
      description: 코드 원문을 검증·예약하고 발급 대기 상태와 조회 위치를 반환한다. 실제 발급 완료는 UserCoupon 생성과 수량 확정 뒤 별도 조회에서 확인한다.
      operationId: redeemCouponCode
      x-api-id: API.A.19-02
      x-use-case: UC.A.19-05
      x-command: CMD.A.19-06
      x-service-design: SD.A.1940
      x-design-doc: ../../API_A_19_02_redeem_coupon_code.md
      x-sensitive-fields:
        - code
      x-error-codes:
        COUPON_INPUT_INVALID: 400
        COUPON_AUTHENTICATION_REQUIRED: 401
        COUPON_FORBIDDEN: 403
        COUPON_IDEMPOTENCY_CONFLICT: 409
        COUPON_BUSINESS_RULE_REJECTED: 422
        COUPON_RATE_LIMITED: 429
        COUPON_DEPENDENCY_UNAVAILABLE: 503
      security:
        - WebSessionCookie: []
          WebCsrfToken: []
          WebOrigin: []
        - MobileBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemCouponCodeRequest'
      responses:
        '202':
          description: 코드 예약과 발급 요청 생성을 접수했다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Location:
              $ref: '#/components/headers/Location'
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/BusinessRejected'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/Unavailable'
  /api/v1/users/me/coupons:
    get:
      tags:
        - CouponWallet
      summary: 내 쿠폰 목록 조회
      description: 현재 사용자의 쿠폰함과 적용 범위에 해당하는 활성 안내를 cursor 방식으로 조회한다.
      operationId: listMyCoupons
      x-api-id: API.A.19-03
      x-use-case: UC.A.19-01
      x-read-models:
        - RM.A.19-01
        - RM.A.19-09
      x-service-design: SD.A.1940
      x-design-doc: ../../API_A_19_03_list_my_coupons.md
      security:
        - WebSessionCookie: []
        - MobileBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/Traceparent'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/WalletStatus'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 현재 사용자 범위의 쿠폰 목록을 반환한다.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletCouponListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '503':
          $ref: '#/components/responses/Unavailable'
  /api/v1/users/me/coupons/{userCouponId}:
    get:
