  parameters:
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/CampaignId'
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: 클라이언트가 제안하며 Gateway가 검증·교체할 수 있는 요청 UUID다.
      schema:
        type: string
        format: uuid
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context traceparent다.
      schema:
        type: string
        maxLength: 128
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: actor·workload와 업무 소유 범위에 묶는 고엔트로피 멱등 키다.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: ^[A-Za-z0-9._:-]+$
    Cursor:
      name: cursor
      in: query
      required: false
      description: 서버가 발급한 불투명한 다음 페이지 cursor다.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserCouponId:
      name: userCouponId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/UserCouponId'
    RedemptionId:
      name: redemptionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RedemptionId'
    XApprovalRefOptional:
      name: X-Approval-Ref
      in: header
      required: false
      description: 위험 기반 운영 정책이 요구할 때 제공하는 승인 원본의 opaque 참조다.
      schema:
        type: string
        minLength: 1
        maxLength: 160
    XApprovalRef:
      name: X-Approval-Ref
      in: header
      required: true
      description: 운영 작업 관리가 발급한 승인 원본의 opaque 참조다.
      schema:
        type: string
        minLength: 1
        maxLength: 160
    BulkJobId:
      name: bulkJobId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/BulkJobId'
    ControlId:
      name: controlId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ControlId'
    RecoveryId:
      name: recoveryId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/RecoveryId'
    UserId:
      name: userId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/UserId'
    XCaseRef:
      name: X-Case-Ref
      in: header
      required: true
      description: 승인된 CS 문의·업무의 opaque 참조다.
      schema:
        type: string
        minLength: 1
        maxLength: 160
  headers:
    XRequestId:
      description: 응답 본문 meta.requestId와 같은 요청 식별자다.
      schema:
        type: string
        format: uuid
      example: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    CacheControlNoStore:
      description: 응답을 브라우저와 중간 캐시에 저장하지 못하게 한다.
      schema:
        type: string
        enum:
          - private, no-store
      example: private, no-store
    Location:
      description: 비동기 작업 또는 생성한 리소스의 상태 조회 상대 경로다.
      schema:
        type: string
        format: uri-reference
      example: /api/v1/users/me/coupons?status=pending
    RetryAfter:
      description: 다음 상태 조회 또는 재시도 전 기다릴 최소 초다.
      schema:
        type: integer
        minimum: 1
      example: 1
  responses:
    BadRequest:
      description: 요청 형식, header, cursor 또는 schema가 유효하지 않다.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ProblemDetails'
              - type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 400
                  code:
                    type: string
                    enum:
                      - COUPON_INPUT_INVALID
          example:
            type: https://api.dropmong.example/problems/coupon-input-invalid
            title: 요청 형식이 올바르지 않습니다.
            status: 400
            code: COUPON_INPUT_INVALID
            detail: 입력값을 확인해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    AuthenticationRequired:
      description: 검증된 사용자 또는 workload credential이 없다.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ProblemDetails'
              - type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 401
                  code:
                    type: string
                    enum:
                      - COUPON_AUTHENTICATION_REQUIRED
          example:
            type: https://api.dropmong.example/problems/coupon-authentication-required
            title: 인증이 필요합니다.
            status: 401
            code: COUPON_AUTHENTICATION_REQUIRED
            detail: 다시 로그인하거나 workload credential을 확인해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    Forbidden:
      description: 소유권, 역할, workload 범위 또는 승인 조건을 충족하지 않는다.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ProblemDetails'
              - type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 403
                  code:
                    type: string
                    enum:
                      - COUPON_FORBIDDEN
          example:
            type: https://api.dropmong.example/problems/coupon-forbidden
            title: 요청을 수행할 수 없습니다.
            status: 403
            code: COUPON_FORBIDDEN
            detail: 권한과 승인 상태를 확인해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    Conflict:
      description: 멱등 key, version, 현재 상태 또는 운영 중지와 충돌한다.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ProblemDetails'
              - type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 409
                  code:
                    type: string
                    enum:
                      - COUPON_IDEMPOTENCY_CONFLICT
                      - COUPON_VERSION_CONFLICT
                      - COUPON_STATE_CONFLICT
                      - COUPON_OPERATION_STOPPED
          example:
            type: https://api.dropmong.example/problems/coupon-state-conflict
            title: 현재 상태에서 요청을 수행할 수 없습니다.
            status: 409
            code: COUPON_STATE_CONFLICT
            detail: 최신 상태와 최초 Idempotency-Key를 확인해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    BusinessRejected:
      description: 자격, 기간, 적용 대상, 할인, 수량 또는 정책 업무 규칙을 충족하지 않는다.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ProblemDetails'
              - type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 422
                  code:
