components:
  securitySchemes:
    WebSessionCookie:
      type: apiKey
      in: cookie
      name: __Host-dm_session
      description: Gateway가 검증하는 로그인 웹 Session cookie다.
    WebCsrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: 현재 웹 Session과 묶인 CSRF token이다.
    WebOrigin:
      type: apiKey
      in: header
      name: Origin
      description: Gateway가 허용 목록과 정확히 비교하는 웹 Origin이다.
    MobileBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 로그인 사용자의 짧은 수명 모바일 access JWT다.
    WorkloadBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 내부 Gateway·mesh가 issuer, audience, workload와 권한을 검증한 단기 workload JWT다.
  schemas:
    CampaignId:
      type: string
      pattern: ^camp_[A-Za-z0-9_-]{8,120}$
      example: camp_01JXYZ1234567890ABCDEFGHJK
    IssueRequestId:
      type: string
      pattern: ^ireq_[A-Za-z0-9_-]{8,120}$
      example: ireq_01JXYZ1234567890ABCDEFGHJK
    IssueAcceptedData:
      type: object
      required:
        - issueRequestId
        - status
        - statusPath
      additionalProperties: false
      properties:
        issueRequestId:
          $ref: '#/components/schemas/IssueRequestId'
        status:
          type: string
          description: 요청 접수 뒤 사용자에게 보이는 상태다. 실제 발급 완료를 뜻하지 않는다.
          enum:
            - pending
        statusPath:
          type: string
          format: uri-reference
          example: /api/v1/users/me/coupons?status=pending
    ResponseMeta:
      type: object
      required:
        - requestId
      additionalProperties: false
      properties:
        requestId:
          type: string
          format: uuid
        asOf:
          type: string
          format: date-time
    IssueAcceptedResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/IssueAcceptedData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ProblemViolation:
      type: object
      required:
        - field
        - reason
      additionalProperties: false
      properties:
        field:
          type: string
          maxLength: 160
        reason:
          type: string
          maxLength: 160
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - code
        - retryable
        - requestId
      additionalProperties: false
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          maxLength: 160
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          pattern: ^COUPON_[A-Z0-9_]+$
        detail:
          type: string
          maxLength: 500
        retryable:
          type: boolean
        requestId:
          type: string
          format: uuid
        violations:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/ProblemViolation'
    RedeemCouponCodeRequest:
      type: object
      required:
        - code
      additionalProperties: false
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 128
          writeOnly: true
          description: 로그·trace·Event에 기록하지 않는 사용자 입력 코드 원문이다.
          example: ABCD-1234-EFGH
    WalletStatus:
      type: string
      enum:
        - pending
        - available
        - reserved
        - used
        - reclaimed
        - expired
        - failed
    UserCouponId:
      type: string
      pattern: ^ucpn_[A-Za-z0-9_-]{8,120}$
      example: ucpn_01JXYZ1234567890ABCDEFGHJK
    Money:
      type: object
      required:
        - amount
        - currency
      additionalProperties: false
      properties:
        amount:
          type: string
          pattern: ^(0|[1-9][0-9]{0,17})(\.[0-9]{1,4})?$
          example: '5000'
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          example: KRW
    Benefit:
      type: object
      required:
        - type
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - fixed_amount
            - percentage
            - shipping_fee
        amount:
          $ref: '#/components/schemas/Money'
        percentage:
          type: string
          pattern: ^(100|[0-9]{1,2})(\.[0-9]{1,2})?$
          example: '10'
        maxDiscountAmount:
          $ref: '#/components/schemas/Money'
      description: type에 맞는 필드만 사용하며 서버가 조합 유효성을 검증한다.
    WalletCoupon:
      type: object
      required:
        - userCouponId
        - campaignId
        - displayName
        - benefit
        - status
        - usableFrom
        - expiresAt
      additionalProperties: false
      properties:
        userCouponId:
          $ref: '#/components/schemas/UserCouponId'
        campaignId:
          $ref: '#/components/schemas/CampaignId'
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        benefit:
          $ref: '#/components/schemas/Benefit'
        status:
          $ref: '#/components/schemas/WalletStatus'
        usableFrom:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
    ControlId:
      type: string
      pattern: ^ctrl_[A-Za-z0-9_-]{8,120}$
      example: ctrl_01JXYZ1234567890ABCDEFGHJK
    ReadOnlyNotice:
      type: object
      required:
        - controlId
        - message
        - effectiveFrom
      additionalProperties: false
      properties:
        controlId:
          $ref: '#/components/schemas/ControlId'
        message:
          type: string
          minLength: 1
          maxLength: 500
        effectiveFrom:
          type: string
          format: date-time
    WalletCouponListData:
      type: object
      required:
        - items
        - activeNotices
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WalletCoupon'
        nextCursor:
          type: string
          maxLength: 512
        activeNotices:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/ReadOnlyNotice'
    WalletCouponListResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/WalletCouponListData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    OpaqueRef:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[A-Za-z0-9._:/-]+$
      example: order:order_01JXYZ1234567890ABCDEFGHJK
    ExternalRef:
      type: object
      required:
        - context
        - type
        - id
      additionalProperties: false
      properties:
        context:
          type: string
          minLength: 1
          maxLength: 64
        type:
          type: string
          minLength: 1
          maxLength: 64
        id:
          $ref: '#/components/schemas/OpaqueRef'
    ApplicabilityPolicy:
      type: object
      required:
        - policySchemaVersion
        - includeTargets
        - excludeTargets
      additionalProperties: false
      properties:
        policySchemaVersion:
          type: integer
          enum:
            - 1
        includeTargets:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/ExternalRef'
        excludeTargets:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/ExternalRef'
        minimumOrderAmount:
          $ref: '#/components/schemas/Money'
        stackingPolicyRef:
          $ref: '#/components/schemas/OpaqueRef'
    IssuerAndFunding:
      type: object
      required:
        - issuerType
        - issuerRef
        - funderType
      additionalProperties: false
      properties:
        issuerType:
          type: string
          enum:
            - platform
            - seller
            - partnership
            - compensation
        issuerRef:
          $ref: '#/components/schemas/ExternalRef'
        funderType:
          type: string
          enum:
            - platform
            - seller
            - joint
            - compensation
        funderRef:
          $ref: '#/components/schemas/ExternalRef'
        platformSharePercentage:
          type: string
          pattern: ^(100|[0-9]{1,2})(\.[0-9]{1,2})?$
    CouponDetailData:
      type: object
      required:
        - userCouponId
        - campaignId
        - displayName
        - benefit
        - status
        - usableFrom
        - expiresAt
        - policyVersion
        - applicability
        - issuerAndFunding
      additionalProperties: false
      properties:
        userCouponId:
          $ref: '#/components/schemas/UserCouponId'
        campaignId:
          $ref: '#/components/schemas/CampaignId'
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        benefit:
          $ref: '#/components/schemas/Benefit'
        status:
          $ref: '#/components/schemas/WalletStatus'
        usableFrom:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        policyVersion:
          type: integer
          minimum: 1
        applicability:
          $ref: '#/components/schemas/ApplicabilityPolicy'
        issuerAndFunding:
          $ref: '#/components/schemas/IssuerAndFunding'
        activeNotice:
          $ref: '#/components/schemas/ReadOnlyNotice'
    CouponDetailResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/CouponDetailData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    SnapshotRef:
      type: object
      required:
        - sourceRef
        - sourceVersion
        - capturedAt
        - payloadHash
      additionalProperties: false
      properties:
        sourceRef:
          $ref: '#/components/schemas/ExternalRef'
        sourceVersion:
          type: string
          minLength: 1
          maxLength: 128
        capturedAt:
          type: string
          format: date-time
        payloadHash:
          type: string
          pattern: ^sha256:[A-Za-z0-9_-]{43}$
    UserId:
      type: string
      minLength: 1
      maxLength: 128
      example: usr_01JXYZ1234567890ABCDEFGHJK
    OrderItemSnapshot:
      type: object
      required:
        - productRef
        - sellerRef
        - quantity
        - unitPrice
      additionalProperties: false
      properties:
        productRef:
          $ref: '#/components/schemas/ExternalRef'
        dropRef:
          $ref: '#/components/schemas/ExternalRef'
        sellerRef:
          $ref: '#/components/schemas/ExternalRef'
        categoryRef:
          $ref: '#/components/schemas/ExternalRef'
        quantity:
          type: integer
          minimum: 1
          maximum: 10000
        unitPrice:
          $ref: '#/components/schemas/Money'
    OrderCandidateSnapshot:
      type: object
      required:
        - snapshotRef
        - orderId
        - userId
        - items
        - shippingFee
      additionalProperties: false
      properties:
        snapshotRef:
          $ref: '#/components/schemas/SnapshotRef'
        orderId:
          $ref: '#/components/schemas/OpaqueRef'
        userId:
          $ref: '#/components/schemas/UserId'
        items:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/OrderItemSnapshot'
        shippingFee:
          $ref: '#/components/schemas/Money'
    ValidateCouponRequest:
      type: object
      required:
        - userCouponId
        - orderSnapshot
        - policyVersion
      additionalProperties: false
      properties:
        userCouponId:
          $ref: '#/components/schemas/UserCouponId'
        orderSnapshot:
          $ref: '#/components/schemas/OrderCandidateSnapshot'
        policyVersion:
          type: integer
          minimum: 1
        stackingPolicyRef:
          $ref: '#/components/schemas/OpaqueRef'
    RedemptionId:
      type: string
      pattern: ^redm_[A-Za-z0-9_-]{8,120}$
      example: redm_01JXYZ1234567890ABCDEFGHJK
    CostShare:
      type: object
      required:
        - bearerType
        - amount
      additionalProperties: false
      properties:
        bearerType:
          type: string
          enum:
            - platform
            - seller
            - joint
            - compensation
        bearerRef:
          $ref: '#/components/schemas/ExternalRef'
        amount:
          $ref: '#/components/schemas/Money'
    AggregateVersion:
      type: integer
      format: int64
      minimum: 0
      example: 3
    CouponValidationData:
      type: object
      required:
        - redemptionId
        - eligible
        - discount
        - finalOrderAmount
        - policyVersion
        - orderSnapshotRef
        - version
      additionalProperties: false
      properties:
        redemptionId:
          $ref: '#/components/schemas/RedemptionId'
        eligible:
          type: boolean
        reasonCode:
          type: string
          maxLength: 80
        discount:
          $ref: '#/components/schemas/Money'
        finalOrderAmount:
          $ref: '#/components/schemas/Money'
        costShares:
          type: array
          items:
            $ref: '#/components/schemas/CostShare'
        policyVersion:
          type: integer
          minimum: 1
        orderSnapshotRef:
          $ref: '#/components/schemas/SnapshotRef'
        version:
          $ref: '#/components/schemas/AggregateVersion'
    CouponValidationResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/CouponValidationData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ExpectedVersionRequest:
      type: object
      required:
        - expectedVersion
      additionalProperties: false
      properties:
        expectedVersion:
          $ref: '#/components/schemas/AggregateVersion'
    RedemptionData:
      type: object
      required:
        - redemptionId
        - status
        - version
        - discount
      additionalProperties: false
      properties:
        redemptionId:
          $ref: '#/components/schemas/RedemptionId'
        status:
          type: string
          enum:
            - evaluated
            - reserved
            - confirmed
            - released
            - reclaimed
        version:
          $ref: '#/components/schemas/AggregateVersion'
        discount:
          $ref: '#/components/schemas/Money'
        reservedUntil:
          type: string
          format: date-time
        resultRef:
          $ref: '#/components/schemas/ExternalRef'
    RedemptionResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/RedemptionData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    RedemptionTransitionRequest:
      type: object
      required:
        - expectedVersion
        - resultRef
        - reasonCode
      additionalProperties: false
      properties:
        expectedVersion:
          $ref: '#/components/schemas/AggregateVersion'
        resultRef:
          $ref: '#/components/schemas/ExternalRef'
        resultSnapshot:
          $ref: '#/components/schemas/SnapshotRef'
        reasonCode:
          type: string
          minLength: 1
          maxLength: 80
    CreateCouponCampaignRequest:
      type: object
      required:
        - displayName
        - benefit
        - applicability
        - issuerAndFunding
        - usableFrom
        - expiresAt
        - ownerSnapshot
        - approvalPolicy
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        benefit:
          $ref: '#/components/schemas/Benefit'
        applicability:
          $ref: '#/components/schemas/ApplicabilityPolicy'
        issuerAndFunding:
          $ref: '#/components/schemas/IssuerAndFunding'
        usableFrom:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        ownerSnapshot:
          $ref: '#/components/schemas/SnapshotRef'
        approvalPolicy:
          allOf:
            - $ref: '#/components/schemas/SnapshotRef'
          description: 승인선·금액·수량 한도를 판정하는 버전이 있는 운영 정책 스냅샷이다.
        templateRef:
          allOf:
            - $ref: '#/components/schemas/ExternalRef'
          description: 판매자 자체 요청을 허용하는 승인된 템플릿 참조다.
        externalBusinessRef:
          $ref: '#/components/schemas/OpaqueRef'
    CampaignData:
      type: object
      required:
        - campaignId
        - status
        - policyVersion
        - version
      additionalProperties: false
      properties:
        campaignId:
          $ref: '#/components/schemas/CampaignId'
        status:
          type: string
          enum:
            - draft
            - under_review
            - approved
            - rejected
            - held
            - active
            - ended
        policyVersion:
          type: integer
          minimum: 1
        version:
          $ref: '#/components/schemas/AggregateVersion'
    CampaignResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/CampaignData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ConfigureIssuanceRequest:
      type: object
      required:
        - expectedVersion
        - totalQuantity
        - perUserLimit
        - claimStartsAt
        - claimEndsAt
      additionalProperties: false
      properties:
        expectedVersion:
          $ref: '#/components/schemas/AggregateVersion'
        totalQuantity:
          type: integer
          minimum: 1
          maximum: 1000000000
        perUserLimit:
          type: integer
          minimum: 1
          maximum: 10000
        claimStartsAt:
          type: string
          format: date-time
        claimEndsAt:
          type: string
          format: date-time
    ReviewCampaignRequest:
      type: object
      required:
        - expectedVersion
        - decision
        - reasonCode
        - sellerOwnershipSnapshot
      additionalProperties: false
      properties:
        expectedVersion:
          $ref: '#/components/schemas/AggregateVersion'
        decision:
          type: string
          enum:
            - approved
            - rejected
            - held
        reasonCode:
          type: string
          minLength: 1
          maxLength: 80
        sellerOwnershipSnapshot:
          $ref: '#/components/schemas/SnapshotRef'
    CreatePolicyVersionRequest:
      type: object
      required:
        - expectedVersion
        - effectiveAt
      additionalProperties: false
      properties:
        expectedVersion:
          $ref: '#/components/schemas/AggregateVersion'
        effectiveAt:
          type: string
          format: date-time
        benefit:
          $ref: '#/components/schemas/Benefit'
        applicability:
          $ref: '#/components/schemas/ApplicabilityPolicy'
        issuerAndFunding:
          $ref: '#/components/schemas/IssuerAndFunding'
      minProperties: 3
    CreateBulkIssueJobRequest:
      type: object
      required:
        - campaignId
        - audienceSnapshot
        - evaluationAsOf
        - operationTaskRef
      additionalProperties: false
      properties:
        campaignId:
          $ref: '#/components/schemas/CampaignId'
        audienceSnapshot:
          $ref: '#/components/schemas/SnapshotRef'
        evaluationAsOf:
          type: string
          format: date-time
        operationTaskRef:
          $ref: '#/components/schemas/ExternalRef'
    BulkJobId:
      type: string
      pattern: ^bjob_[A-Za-z0-9_-]{8,120}$
      example: bjob_01JXYZ1234567890ABCDEFGHJK
    BulkJobAcceptedData:
      type: object
      required:
        - bulkJobId
        - status
        - statusPath
      additionalProperties: false
      properties:
        bulkJobId:
          $ref: '#/components/schemas/BulkJobId'
        status:
          type: string
          enum:
            - registered
        statusPath:
          type: string
          format: uri-reference
    BulkJobAcceptedResponse:
      type: object
      required:
        - data
        - meta
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/BulkJobAcceptedData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PerformanceCounts:
      type: object
      required:
        - requested
        - issued
        - rejected
        - failedFinal
        - reserved
        - confirmed
        - released
        - reclaimed
      additionalProperties: false
      properties:
        requested:
          type: integer
          format: int64
          minimum: 0
        issued:
          type: integer
          format: int64
          minimum: 0
        rejected:
          type: integer
          format: int64
          minimum: 0
        failedFinal:
          type: integer
          format: int64
