openapi: 3.1.0
info:
  title: User Service API
  version: 0.1.0
  description: Owns DropMong member profiles and status. The historical service name remains user-service.
paths:
  /v1/internal/users/ensure:
    post:
      tags:
        - users
      summary: Idempotently create or return a user profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnsureUserRequest"
      responses:
        "200":
          description: User profile exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: userId is missing.
  /v1/users/me:
    get:
      tags:
        - users
      summary: Return the authenticated user's profile, creating it lazily when needed.
      parameters:
        - $ref: "#/components/parameters/Principal"
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Principal header is missing or invalid.
  /v1/users/me/profile:
    patch:
      tags:
        - users
      summary: Update the authenticated user's profile fields.
      parameters:
        - $ref: "#/components/parameters/Principal"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Updated user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Profile values are invalid.
        "401":
          description: Principal header is missing or invalid.
  /v1/users/{userId}:
    get:
      tags:
        - users
      summary: Return a user profile for the owner or an operator.
      parameters:
        - $ref: "#/components/parameters/Principal"
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Principal header is missing or invalid.
        "403":
          description: Principal cannot read this user.
  /healthz:
    $ref: ./operational/healthz.yaml
  /readyz:
    $ref: ./operational/readyz.yaml
  /metrics:
    $ref: ./observability/metrics.yaml
components:
  parameters:
    Principal:
      name: X-Principal
      in: header
      required: true
      schema:
        type: string
      description: Base64url encoded Principal JSON issued by auth-service.
  schemas:
    EnsureUserRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
    ProfileUpdateRequest:
      type: object
      properties:
        realName:
          type: string
        nickname:
          type: string
        profileIcon:
          type: string
    User:
      type: object
      required:
        - userId
        - realName
        - nickname
        - profileIcon
        - status
      properties:
        userId:
          type: string
        realName:
          type: string
        nickname:
          type: string
        profileIcon:
          type: string
        status:
          type: string
