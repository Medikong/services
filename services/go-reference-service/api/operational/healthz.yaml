get:
  operationId: getHealth
  summary: 프로세스 생존 확인
  responses:
    '200':
      description: 프로세스가 요청에 응답할 수 있음
      content:
        application/json:
          schema:
            type: object
            required: [status, service, timestamp]
            properties:
              status:
                type: string
                const: ok
              service:
                type: string
              timestamp:
                type: string
                format: date-time
